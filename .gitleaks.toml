# =============================================================================
# gitleaks config — secret scanner for mirador-ui.
#
# Runs on:
#   - pre-commit (via lefthook) — scans staged changes
#   - CI        (via .gitlab-ci.yml secret-scan job) — scans the whole repo
#
# Config schema for gitleaks 8.21+:
#   - Top-level allowlist uses singular `[allowlist]` (map, not slice).
#     The pre-8.21 `[[rules.allowlist]]` (slice) is rejected with
#     "Rules[0].AllowList expected a map, got 'slice'".
#   - A finding is ignored if it matches EITHER `paths` OR `regexes`.
#
# Same shape as the mirador-service config; kept separate so each repo
# can have its own allowlist.
# =============================================================================

title = "Mirador UI — gitleaks config"

[extend]
useDefault = true

[allowlist]
description = "Global allowlist — paths and content that would match default rules but aren't real secrets."
paths = [
  '''\.env''',                     # .env is gitignored; .env.example is a template
  '''docs/examples/.+\.json''',
  '''src/.*\.spec\.ts''',
  '''node_modules/''',
  '''\.angular/''',
  '''dist/''',
  '''docs/(compodoc|typedoc)/''',
]
regexes = [
  # Demo credentials — README shows admin/admin and demo user.
  '''admin/admin''',
  '''demo''',
  '''localhost''',
  # Fake JWT tokens in tests (header.payload.signature shape).
  '''eyJhbGciOiJIUzI1NiIs[A-Za-z0-9_\-\.]+''',
]
