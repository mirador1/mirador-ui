workflow:
  # Allowlist of paths that trigger the pipeline. Pure doc commits (**/*.md,
  # docs/**) don't match → no pipeline created → no CI quota burned.
  # To force a pipeline for a doc change: GitLab UI → "Run pipeline".
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "src/**/*"
        - "package.json"
        - "package-lock.json"
        - "angular.json"
        - "tsconfig*.json"
        - "config/proxy.conf.json"
        - "build/Dockerfile*"
        - ".dockerignore"
        - "deploy/nginx.conf"
        - ".gitlab-ci.yml"
        - "public/**/*"
        # E2E spec changes retrigger CI so Playwright runs against the
        # updated flow. `playwright.config.ts` + `e2e/**` tracked here.
        - "playwright.config.ts"
        - "e2e/**/*"
        # vitest.config.ts tunes the unit-test pool — changes affect
        # every unit-test job, so we must rerun the suite. Pipeline #278
        # would have caught the threads-vs-forks regression earlier
        # if this path had been in the allowlist.
        - "vitest.config.ts"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "src/**/*"
        - "package.json"
        - "package-lock.json"
        - "angular.json"
        - "tsconfig*.json"
        - "config/proxy.conf.json"
        - "build/Dockerfile*"
        - ".dockerignore"
        - "deploy/nginx.conf"
        - ".gitlab-ci.yml"
        - "public/**/*"
        # E2E spec changes retrigger CI so Playwright runs against the
        # updated flow. `playwright.config.ts` + `e2e/**` tracked here.
        - "playwright.config.ts"
        - "e2e/**/*"
        # vitest.config.ts tunes the unit-test pool — changes affect
        # every unit-test job, so we must rerun the suite. Pipeline #278
        # would have caught the threads-vs-forks regression earlier
        # if this path had been in the allowlist.
        - "vitest.config.ts"
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - validate
  - test
  - build
  - e2e           # Playwright browser E2E against a live backend (ADR-0033)
  - quality
  - test-image    # Build + push Docker image (validation artefact — UI is not deployed to K8s per ADR-0025)
  - deploy    # Legacy PaaS deploy targets — kept manual; UI runs only on the developer laptop

variables:
  NODE_VERSION: "22"

default:
  image: node:${NODE_VERSION}-alpine
  # No global runner tag — most jobs (lint, build, test) run on any available runner.
  # Image-related jobs (docker-build, trivy, sbom, grype, dockle, cosign) are
  # tagged macbook-local: they use the host Docker socket + buildx/QEMU for
  # cross-compile (arm64 host → amd64 image). SaaS runners are never used
  # (CI quota policy — see sibling service repo ADR-0004).
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - node_modules/
    policy: pull-push

# ── Install ──────────────────────────────────────────────────────────────────
.install:
  before_script:
    - npm ci --prefer-offline

# ── Stage: validate ─────────────────────────────────────────────────────────
typecheck:
  stage: validate
  extends: .install
  script:
    - npx tsc --noEmit -p tsconfig.app.json
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

lint:format:
  stage: validate
  extends: .install
  script:
    - npx prettier --check "src/**/*.{ts,html,scss,json}"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: test ──────────────────────────────────────────────────────────────
unit-tests:
  stage: test
  extends: .install
  # vitest's fork-pool workers can time out under runner CPU pressure when
  # multiple pipelines schedule concurrently (pipeline #257 died with
  # "Timeout waiting for worker to respond" after 60 s with zero tests run).
  # One retry on runner_system_failure absorbs the flake; real test
  # failures still exit 1 and won't loop.
  retry:
    max: 1
    when: runner_system_failure
  script:
    - npx ng test --watch=false
  coverage: '/All files\s*\|\s*[\d.]+/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Node 20 compat ──────────────────────────────────────────────────────────
unit-tests:node20:
  stage: test
  extends: .install
  image: node:20-alpine
  # Same flake class as unit-tests above — vitest forks timing out on
  # runner pressure. Identical retry policy.
  retry:
    max: 1
    when: runner_system_failure
  script:
    - npx ng test --watch=false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: build ─────────────────────────────────────────────────────────────
build:production:
  stage: build
  extends: .install
  # Route to macbook-local so the build has the full host RAM available
  # instead of being confined to the shared-runner container memory tier.
  # Pipeline #264 SIGKILL'd (exit 137) on the shared runner; macbook-local
  # gets the host's full 8 GB Docker Desktop allocation.
  tags:
    - macbook-local
  retry:
    max: 1
    when: runner_system_failure
  # `resource_group: heavy-build` serialises with docker-build (also
  # macbook-local + memory-heavy) so we never run two memory-hungry
  # jobs concurrently on the same runner — pipeline #265 OOM-killed
  # because build:production + something else were both fighting for
  # the same 4 GB cgroup.
  resource_group: heavy-build
  variables:
    # Angular 21 production build with sourceMap=false + extractLicenses=false
    # + namedChunks=false (set in angular.json) brings peak heap from
    # ~2.4 GB down to ~1.6 GB. NODE_OPTIONS=2048 forces Node's GC to
    # kick in earlier — ironically lower limits help the OS-level OOM
    # avoidance because Node releases memory to the cgroup more often.
    NODE_OPTIONS: "--max-old-space-size=2048"
  script:
    - |
      BUILD_OUT=$(npx ng build --configuration production 2>&1)
      echo "$BUILD_OUT"
      mkdir -p dist
      echo "$BUILD_OUT" > dist/build-warnings.txt
    - |
      echo "── Bundle analysis ──"
      du -sh dist/mirador-ui/browser/*.js 2>/dev/null | sort -rh | head -10 || true
      echo ""
      TOTAL=$(du -sh dist/mirador-ui/browser/ 2>/dev/null | cut -f1 || echo "n/a")
      echo "Total bundle size: $TOTAL"
  artifacts:
    paths:
      - dist/
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

lint:circular-deps:
  stage: build
  needs: ["build:production"]
  script:
    - |
      echo "Checking for circular imports in build output..."
      if grep -qi "circular" dist/build-warnings.txt 2>/dev/null; then
        echo "FAIL: Circular dependencies detected"
        grep -i "circular" dist/build-warnings.txt
        exit 1
      fi
      echo "OK: No circular dependencies"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: e2e ───────────────────────────────────────────────────────────────
# Playwright browser suite against a live backend. Rationale + scope:
# `docs/adr/0033-playwright-e2e-in-kind-in-ci.md` in the mirador-service
# repo.
#
# Topology: the backend runs inside this job (docker-compose from the
# sibling service repo), not inside the kind cluster. The ADR chose
# option A (compose-up) over option B (multi-arch kind image): the E2E
# asserts the user-visible contract, not the deployment topology, and
# the ADR-0028 kind job already validates manifests separately.
#
# `allow_failure: true` initially — Playwright flakiness is real until
# the suite has 10 green runs in a row, at which point we flip to
# hard-fail per ADR-0033 "Revisit this when" clause.
e2e:kind:
  stage: e2e
  # macbook-local gives us Docker-in-Docker so docker-compose works for
  # the backend deps (postgres + redis + kafka). Shared GitLab runners
  # don't expose /var/run/docker.sock.
  tags:
    - macbook-local
  # Large image — Playwright + Chromium + Node + Java 25. We ship a
  # custom image in a future iteration; for now use the official
  # Playwright container (ships Chromium pre-installed) and add Java
  # + Maven in the before_script.
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  needs:
    - job: build:production
      artifacts: true    # consume the dist/ artefact produced upstream
  rules:
    # MR pipelines + default branch + weekly schedule (detects slow
    # upstream drift in Spring / Angular minor bumps).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  allow_failure: true    # see ADR-0033; flip to false after 10 green runs
  variables:
    # Backend service repo — cloned next to the UI checkout so we can
    # run `./run.sh app` against postgres/kafka/redis in compose. Token
    # is read-only, scoped to the `mirador-service` project.
    SERVICE_REPO: "https://gitlab.com/mirador1/mirador-service.git"
    E2E_BASE_URL: "http://localhost:4200"
  before_script:
    # Install Java 25 + Maven (Playwright image is Debian jammy-based).
    # Also docker CLI + compose plugin: the runner mounts /var/run/docker.sock
    # but the Playwright image ships no docker client, so any `docker compose`
    # invocation in the script fails with `command not found`. We use the
    # official Docker apt repo for compose v2 (Ubuntu's docker.io ships only
    # docker-compose v1 which is EOL).
    - apt-get update -qq && apt-get install -y -qq curl gnupg openjdk-21-jdk-headless maven
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq && apt-get install -y -qq docker-ce-cli docker-compose-plugin
    - npm ci --prefer-offline
  script:
    - |
      set -euxo pipefail

      # 1. Bring up the backend's infra deps via the service repo's
      #    docker-compose.yml. We only need db + kafka + redis —
      #    the rest (observability, Keycloak) is demo eye candy.
      # The Postgres service is named `db` in svc's compose file (not
      # `postgres`); calling it by the wrong name fails fast with
      # `no such service`.
      # The compose file references DB_USER/DB_PASSWORD/etc from .env
      # which doesn't exist in the fresh clone — we set sane defaults
      # so the warnings don't cause empty-string container args that
      # crash on first connection.
      # svc's compose file pins container_names (postgres-demo,
      # kafka-demo, redis-demo) — those are GLOBAL on the docker
      # daemon and conflict with the developer's local dev stack
      # (we share the host socket with macbook-local). Two flavours
      # of conflict observed:
      #   1. `Conflict. The container name "/redis-demo" is already
      #      in use` → blocks the whole stack from starting.
      #   2. Concurrent CI jobs racing on the same name.
      # Fix: strip `container_name:` lines from the cloned compose
      # file BEFORE invoking docker compose. Combined with `-p` for
      # a unique project namespace, every CI job gets isolated
      # containers that don't touch the host's local dev stack.
      git clone --depth=1 "$SERVICE_REPO" /tmp/svc
      sed -i '/^[[:space:]]*container_name:/d' /tmp/svc/docker-compose.yml
      COMPOSE_PROJECT="ci-${CI_JOB_ID}"
      (cd /tmp/svc && \
        DB_PORT=5432 DB_USER=mirador DB_PASSWORD=mirador DB_NAME=mirador \
        SERVER_PORT=8080 \
        docker compose -p "$COMPOSE_PROJECT" -f docker-compose.yml up -d db kafka redis)

      # 2. Compile + start the Spring Boot app in the background. The
      #    `./run.sh app` script blocks on the foreground; we daemonise
      #    with `nohup &` and wait for /actuator/health to return UP.
      (cd /tmp/svc && nohup mvn -q -DskipTests spring-boot:run > /tmp/app.log 2>&1 &)
      for i in $(seq 1 60); do
        curl -sSf http://localhost:8080/actuator/health >/dev/null 2>&1 && break
        sleep 2
      done
      curl -sSf http://localhost:8080/actuator/health || { tail -40 /tmp/app.log; exit 1; }

      # 3. Serve the Angular production build on :4200 (http-server is
      #    a transient dep — lighter than ng serve, static, fast).
      npx --yes http-server dist/mirador-ui/browser -p 4200 -s &
      for i in $(seq 1 30); do
        curl -sSf http://localhost:4200 >/dev/null 2>&1 && break
        sleep 1
      done

      # 4. Run the Playwright golden-path suite only. `@demo` is the
      #    recording spec used by bin/record-demo.sh for the README
      #    GIF and takes ~30 s of cosmetic delays — exclude in CI.
      #    retries:2 + CI env var flips to CI mode (see playwright.config.ts).
      CI=1 npx playwright test --grep @golden
  after_script:
    # Always stop compose — leaking postgres on the runner would
    # accumulate disk. `|| true` because the job may fail before
    # `docker compose up` ran. `-p ci-${CI_JOB_ID}` matches the
    # project namespace from before_script so we tear down THIS
    # job's stack only (no risk of nuking a parallel CI job's
    # containers, nor the developer's local dev stack).
    - (cd /tmp/svc && docker compose -p "ci-${CI_JOB_ID}" -f docker-compose.yml down -v) || true
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
    reports:
      junit: playwright-report/results.xml
    expire_in: 14 days

# ── Stage: quality ───────────────────────────────────────────────────────────
bundle-size-check:
  stage: quality
  needs: ["build:production"]
  script:
    - |
      MAX_SIZE_KB=500
      MAIN_JS=$(ls dist/mirador-ui/browser/main-*.js 2>/dev/null | head -1)
      if [ -z "$MAIN_JS" ]; then
        echo "WARN: No main-*.js found in dist, skipping bundle size check"
        exit 0
      fi
      INITIAL=$(du -sk "$MAIN_JS" | cut -f1)
      echo "Initial bundle: ${INITIAL}kB (max: ${MAX_SIZE_KB}kB)"
      if [ "$INITIAL" -gt "$MAX_SIZE_KB" ]; then
        echo "WARN: Initial bundle exceeds ${MAX_SIZE_KB}kB"
      else
        echo "OK: Bundle within budget"
      fi
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

security:audit:
  stage: quality
  extends: .install
  script:
    - npm audit --audit-level=high || true
    - |
      echo "── Checking for sensitive files ──"
      SENSITIVE=$(find src -name ".env*" -o -name "*.pem" -o -name "*.key" -o -name "credentials*" 2>/dev/null)
      if [ -n "$SENSITIVE" ]; then
        echo "FAIL: Sensitive files found in src/:"
        echo "$SENSITIVE"
        exit 1
      fi
      echo "OK: No sensitive files in src/"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── SonarCloud ───────────────────────────────────────────────────────────────
# Static code analysis via SonarCloud (SaaS, free for public repos).
# sonar-project.properties at the repo root sets the org/project key.
#
# Prerequisites (one-time setup):
#   1. Create org at https://sonarcloud.io (log in with GitLab)
#   2. Import the mirador-ui project (auto-detected from GitLab)
#   3. Generate a token at https://sonarcloud.io/account/security
#   4. Set SONAR_TOKEN in GitLab group CI/CD variables (mirador1 → Settings → CI/CD)
#
# No SONAR_HOST_URL needed — hardcoded to sonarcloud.io.
sonarcloud:
  stage: quality
  image:
    name: sonarsource/sonar-scanner-cli:11
    entrypoint: [""]
  needs: ["unit-tests", "build:production"]
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"    # full clone for accurate blame/line info
  cache:
    key: sonar-${CI_COMMIT_REF_SLUG}
    paths:
      - .sonar/cache
  script:
    # config/sonar-project.properties provides org/projectKey; token from CI variable.
    # -Dproject.settings points the scanner at the moved config file.
    # sonar.javascript.node.maxspace=4096 + node.timeout=600 — the JS bridge
    # subprocess (analyses .ts/.js) needs ≥2GB heap for our codebase and
    # the default 300s startup timeout is too tight on a busy macbook-local
    # runner; pipeline #271 failed with "Failed to start the bridge server
    # (300s timeout)" before we landed on these values.
    - sonar-scanner
        -Dproject.settings=config/sonar-project.properties
        -Dsonar.host.url="https://sonarcloud.io"
        -Dsonar.token="${SONAR_TOKEN}"
        -Dsonar.javascript.node.maxspace=4096
        -Dsonar.javascript.node.timeout=600
  allow_failure: true    # SonarCloud outage must not block deployments
  rules:
    - if: '$SONAR_TOKEN == null || $SONAR_TOKEN == ""'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── TypeDoc API documentation ─────────────────────────────────────────────────
#
# Generates TypeScript API docs from JSDoc comments in Angular services, components,
# and interfaces. Output is published as a pipeline artifact (browsable in GitLab).
#
# The backend's generate-reports job can also invoke `npm run typedoc` as part
# of a combined site that includes Maven site + Compodoc + TypeDoc.
#
# config/typedoc.json controls entry points, output dir, and theme.
typedoc:
  stage: quality
  extends: .install
  needs: ["build:production"]
  script:
    # Run TypeDoc — warns are informational; docs still generate cleanly
    - npm run typedoc 2>&1 | tee typedoc-output.txt
    - echo "TypeDoc docs generated at docs/typedoc/"
  artifacts:
    name: "typedoc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - docs/typedoc/
    expire_in: 30 days
    when: always
  allow_failure: true   # documentation failure must not block deployments
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: docker ─────────────────────────────────────────────────────────────
#
# Build the Angular Docker image (Nginx + compiled SPA) and push it to the
# GitLab Container Registry. Runs only on main and version tags — not on MRs
# to avoid flooding the registry with images that are never deployed.
#
# One tag pushed: $CI_COMMIT_SHA (immutable, traceable).
# Per ADR-0025 the UI is never deployed to Kubernetes, so there is no
# Argo CD puller that would consume a moving :main tag. The downstream
# scan jobs (trivy, syft, dockle, cosign) all reference :$CI_COMMIT_SHA.
docker-build:
  # Runs on macbook-local (Apple Silicon arm64) with host Docker socket + buildx.
  # Cross-compile to amd64 via QEMU so the image matches GKE node arch.
  # Never uses SaaS shared runners (CI quota policy, see ADR-0004 in the
  # sibling service repo).
  stage: test-image
  interruptible: false   # Expensive — don't restart mid-build on a new push.
  image: docker:28
  tags:
    - macbook-local
  needs:
    - job: build:production    # Angular bundle must pass before building the image
      artifacts: false
    - job: unit-tests
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Register QEMU user-mode emulation for cross-compilation (arm64 host → amd64 image).
    - docker run --privileged --rm tonistiigi/binfmt --install amd64 || true
    # Create (or reuse) a buildx builder supporting multi-platform targets.
    - docker buildx create --name multi --use 2>/dev/null || docker buildx use multi
  script:
    - |
      docker buildx build \
        -f build/Dockerfile \
        --platform linux/amd64 \
        --tag "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --cache-from "type=registry,ref=$CI_REGISTRY_IMAGE:cache" \
        --cache-to "type=registry,ref=$CI_REGISTRY_IMAGE:cache,mode=max" \
        --push \
        .

trivy:scan:
  # Scans the freshly built frontend Docker image for OS + CVEs using Trivy.
  # allow_failure:true — CVEs are tracked informationally, not build-blocking.
  stage: test-image
  # aquasec/trivy no longer publishes :latest (since ~0.60). Pin a real tag.
  # entrypoint:[""] overrides `trivy` default entrypoint — GitLab CI wraps
  # the script in `sh -c` which trivy rejects as `unknown command "sh"`.
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true
  script:
    # trivy pulls directly from the registry with its own HTTP client — no
    # Docker daemon needed.
    - |
      trivy image \
        --exit-code 0 \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-report.json \
        --username "$CI_REGISTRY_USER" \
        --password "$CI_REGISTRY_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - |
      trivy image \
        --exit-code 0 \
        --severity HIGH,CRITICAL \
        --username "$CI_REGISTRY_USER" \
        --password "$CI_REGISTRY_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - trivy-report.json

# ── hadolint — Dockerfile lint ────────────────────────────────────────────────
hadolint:
  stage: validate
  image:
    name: hadolint/hadolint:v2.12.0-debian
    entrypoint: [""]
  rules:
    - changes: [build/Dockerfile]
    - if: $CI_COMMIT_BRANCH == "main"
  script:
    - hadolint --failure-threshold error build/Dockerfile

# ── Secret scan (gitleaks) ────────────────────────────────────────────────────
secret-scan:
  stage: validate
  image:
    name: zricethezav/gitleaks:v8.21.4
    entrypoint: [""]
  rules:
    - when: on_success
  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact --verbose
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 1 week

# ── Renovate config lint ──────────────────────────────────────────────────────
renovate-lint:
  stage: validate
  image: node:22-alpine
  rules:
    - changes: [renovate.json]
  script:
    - npx --yes --package renovate renovate-config-validator --strict renovate.json

# ── SBOM (Trivy) — CycloneDX + SPDX ───────────────────────────────────────────
# Switched from anchore/syft to aquasec/trivy because syft's amd64
# Go binary panics deterministically under QEMU emulation on the
# arm64 macbook-local runner (`fatal error: lfstack.push` during
# the javascript cataloger init — see project_lgtm_pitfalls memory
# file). Trivy generates the same SBOM formats and is already
# pinned in `trivy:scan` for CVE work — one tool, two outputs.
# Job name kept as `sbom:syft` to avoid renaming `needs:` chains
# in grype:scan + downstream; comment captures the actual tool.
sbom:syft:
  stage: test-image
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  retry:
    max: 1
    when: runner_system_failure
  script:
    - trivy registry login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD"
    - trivy image --format cyclonedx --output bom.cdx.json "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - trivy image --format spdx-json --output bom.spdx.json "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - bom.cdx.json
      - bom.spdx.json
    reports:
      cyclonedx: bom.cdx.json

# ── Grype CVE scan (reads SBOM) ───────────────────────────────────────────────
grype:scan:
  stage: test-image
  image:
    name: anchore/grype:v0.87.0
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: sbom:syft
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true
  script:
    - grype sbom:bom.cdx.json --fail-on high --output table
    - grype sbom:bom.cdx.json --output json > grype-report.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - grype-report.json

# ── Dockle — container policy checks (CIS Docker, non-root, no secrets) ──────
# The UI image is built single-arch linux/amd64 (ADR-0023: GKE nodes are
# amd64 only, arm64 build = wasted minutes). Runner is arm64; dockle
# defaults to requesting the runner's arch and fails with
# "no image found in image index for architecture arm64". We pass
# `--image-platform linux/amd64` to force it to fetch the amd64 layer.
dockle:
  stage: test-image
  image:
    name: goodwithtech/dockle:v0.4.15
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true
  variables:
    DOCKLE_USERNAME: "$CI_REGISTRY_USER"
    DOCKLE_PASSWORD: "$CI_REGISTRY_PASSWORD"
    DOCKLE_PLATFORM: "linux/amd64"
  script:
    # dockle v0.4.15 doesn't support --image-platform (added in a later
    # release we haven't pinned to yet). Since `docker-build` produces
    # a single-platform image (linux/amd64 via buildx), dockle picks
    # the correct manifest automatically.
    - dockle --exit-code 0 --format json --output dockle-report.json
          "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - dockle --exit-code 0 "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - dockle-report.json

# ── cosign keyless signing via GitLab OIDC + Sigstore Fulcio ──────────────────
# Image choice: the upstream `gcr.io/projectsigstore/cosign:v2.5.0` is fully
# distroless — no `sh` — so GitLab's runner wrapper fails instantly with
# `exec: "sh": executable file not found` (pipeline #249 root cause).
# Download the binary into a plain alpine container instead; this also
# lets us pick the right arch automatically via `uname -m`.
cosign:sign:
  stage: test-image
  image: alpine:3.22
  tags:
    - macbook-local
  needs:
    - job: docker-build
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  allow_failure: true
  variables:
    COSIGN_YES: "true"
    COSIGN_EXPERIMENTAL: "1"
    COSIGN_VERSION: "v2.5.0"
  before_script:
    - apk add --no-cache curl ca-certificates
    - |
      ARCH=$(uname -m)
      case "$ARCH" in
        aarch64) COSIGN_ARCH=arm64 ;;
        x86_64)  COSIGN_ARCH=amd64 ;;
        *) echo "unsupported arch $ARCH" && exit 1 ;;
      esac
      curl -sSLo /usr/local/bin/cosign \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-${COSIGN_ARCH}"
      chmod +x /usr/local/bin/cosign
      cosign version
  script:
    - cosign login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - cosign sign --identity-token "$SIGSTORE_ID_TOKEN" "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

# ── release-please — auto CHANGELOG + semver tags on main ───────────────────
release-please:
  stage: deploy
  image: node:22-alpine
  needs: []
  rules:
    - if: $CI_COMMIT_BRANCH == "main" && $RELEASE_PLEASE_TOKEN
  before_script:
    - apk add --no-cache git
  script:
    - |
      npx --yes release-please release-pr \
        --token "$RELEASE_PLEASE_TOKEN" \
        --repo-url "$CI_PROJECT_URL" \
        --target-branch main \
        --config-file release-please-config.json \
        --manifest-file .release-please-manifest.json
      npx --yes release-please github-release \
        --token "$RELEASE_PLEASE_TOKEN" \
        --repo-url "$CI_PROJECT_URL" \
        --target-branch main \
        --config-file release-please-config.json \
        --manifest-file .release-please-manifest.json
  allow_failure: true

# ── Stage: deploy ─────────────────────────────────────────────────────────────
#
# Six deployment targets — one auto (GKE Autopilot, default) + five manual.
# Mirrors the backend deploy stage. All targets deploy the image from the
# GitLab Container Registry built in the docker stage above.
#
# Provider         Required variables (same as backend, shared across projects)
# ──────────────── ─────────────────────────────────────────────────────────────
# GKE Autopilot ✓  GCP_SA_KEY, GCP_PROJECT, GKE_CLUSTER, GKE_REGION, K8S_HOST
# AWS EKS          AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_REGION, EKS_CLUSTER, K8S_HOST
# Azure AKS        AZURE_APP_ID, AZURE_PASSWORD, AZURE_TENANT, AKS_RG, AKS_CLUSTER, K8S_HOST
# Google Cloud Run GCP_SA_KEY, GCP_PROJECT, GCP_REGION
# Fly.io           FLY_API_TOKEN
# k3s / bare metal K8S_SERVER, K8S_TOKEN, K8S_CA_CERT, K8S_HOST

# Common kubectl apply fragment — applies the frontend k8s manifests.
.kubectl-apply-ui:
  script:
    - export IMAGE_REGISTRY="$CI_REGISTRY_IMAGE"
    - export UI_IMAGE_TAG="$CI_COMMIT_SHA"
    - |
      kubectl create namespace app --dry-run=client -o yaml | kubectl apply -f -
    - |
      # GitLab registry pull secret (idempotent)
      kubectl create secret docker-registry gitlab-registry \
        --docker-server="$CI_REGISTRY" \
        --docker-username="$CI_REGISTRY_USER" \
        --docker-password="$CI_REGISTRY_PASSWORD" \
        --namespace=app --dry-run=client -o yaml | kubectl apply -f -
    - |
      # Apply frontend manifests — envsubst replaces ${IMAGE_REGISTRY}, ${UI_IMAGE_TAG}
      for f in deploy/kubernetes/frontend/deployment.yaml deploy/kubernetes/frontend/service.yaml; do
        [ -f "$f" ] && envsubst < "$f" | kubectl apply -f -
      done
    - kubectl rollout status deployment/customer-ui -n app --timeout=120s

# deploy:gke + smoke-test retired with mirador-service ADR-0025 + ADR-0027:
# the UI is no longer deployed to any Kubernetes cluster — it runs on the
# developer's laptop and reaches the cluster through bin/pf-prod.sh tunnels.
# The image is still built and scanned (test-image stage above) as a
# validation artefact.
#
# If you ever need a one-off manual push, the remaining deploy:* jobs
# (EKS, AKS, Cloud Run, Fly, k3s) are all when:manual.

# ── AWS EKS — manual ──────────────────────────────────────────────────────────
deploy:eks:
  stage: deploy
  image: alpine/k8s:1.30.2
  needs:
    - job: docker-build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: production/eks
    url: "https://$K8S_HOST"
  script:
    - aws eks update-kubeconfig --name "$EKS_CLUSTER" --region "$AWS_REGION"
    - !reference [.kubectl-apply-ui, script]

# ── Azure AKS — manual ────────────────────────────────────────────────────────
deploy:aks:
  stage: deploy
  image: mcr.microsoft.com/azure-cli:latest
  needs:
    - job: docker-build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: production/aks
    url: "https://$K8S_HOST"
  before_script:
    - az aks install-cli --only-show-errors
  script:
    - az login --service-principal -u "$AZURE_APP_ID" -p "$AZURE_PASSWORD"
        --tenant "$AZURE_TENANT" --output none
    - az aks get-credentials --resource-group "$AKS_RG" --name "$AKS_CLUSTER"
    - !reference [.kubectl-apply-ui, script]

# ── Google Cloud Run — manual ─────────────────────────────────────────────────
# Serves the pre-built Nginx image on Cloud Run. No k8s needed.
# Note: Cloud Run serves port 80 from the container directly.
deploy:cloud-run:
  stage: deploy
  image: google/cloud-sdk:alpine
  needs:
    - job: docker-build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: production/cloud-run
  script:
    - echo "$GCP_SA_KEY" | base64 -d > /tmp/sa.json
    - gcloud auth activate-service-account --key-file=/tmp/sa.json
    - gcloud config set project "$GCP_PROJECT"
    - |
      gcloud run deploy customer-ui \
        --image "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" \
        --region "${GCP_REGION:-europe-west1}" \
        --platform managed \
        --allow-unauthenticated \
        --port 80 \
        --cpu 1 --memory 256Mi \
        --quiet

# ── Fly.io — manual ───────────────────────────────────────────────────────────
deploy:fly:
  stage: deploy
  image: flyio/flyctl:latest
  needs:
    - job: docker-build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: production/fly
  script:
    - flyctl auth token "$FLY_API_TOKEN"
    - flyctl deploy --image "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" --remote-only

# ── k3s / self-hosted — manual ─────────────────────────────────────────────────
deploy:k3s:
  stage: deploy
  image: bitnami/kubectl:latest
  needs:
    - job: docker-build
      artifacts: false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
      when: manual
      allow_failure: true
  environment:
    name: production/k3s
    url: "https://$K8S_HOST"
  script:
    - |
      kubectl config set-cluster self-hosted \
        --server="$K8S_SERVER" \
        --certificate-authority=<(echo "$K8S_CA_CERT" | base64 -d)
      kubectl config set-credentials ci-runner --token="$K8S_TOKEN"
      kubectl config set-context default --cluster=self-hosted --user=ci-runner
      kubectl config use-context default
    - !reference [.kubectl-apply-ui, script]

