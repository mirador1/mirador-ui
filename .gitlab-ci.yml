workflow:
  # Allowlist of paths that trigger the pipeline. Pure doc commits (**/*.md,
  # docs/**) don't match → no pipeline created → no CI quota burned.
  # To force a pipeline for a doc change: GitLab UI → "Run pipeline".
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - "src/**/*"
        - "package.json"
        - "package-lock.json"
        - "angular.json"
        - "tsconfig*.json"
        - "config/proxy.conf.json"
        - "build/Dockerfile*"
        # Includes build/sonar-scanner.Dockerfile (extension-style name).
        # Without this glob, changing the sonar image Dockerfile didn't
        # trigger the validate stage's sonar-scanner:image job — observed
        # 2026-04-25 with commit 5293974 (mkdir fix landed but no CI ran).
        - "build/*.Dockerfile"
        - ".dockerignore"
        - "deploy/nginx.conf"
        - ".gitlab-ci.yml"
        - ".gitlab-ci/**/*"        # Phase B-4 includes — changes MUST trigger CI
        - "public/**/*"
        # E2E spec changes retrigger CI so Playwright runs against the
        # updated flow. `playwright.config.ts` + `e2e/**` tracked here.
        - "playwright.config.ts"
        - "e2e/**/*"
        # vitest.config.ts tunes the unit-test pool — changes affect
        # every unit-test job, so we must rerun the suite. Pipeline #278
        # would have caught the threads-vs-forks regression earlier
        # if this path had been in the allowlist.
        - "config/vitest.config.ts"
        # Tool config files that gate specific lint/scan jobs. Adding any
        # rule to one of these MUST trigger CI so reviewers see the new
        # signal (otherwise the change merges with stale validation,
        # exactly what happened to UI MR !68 on 2026-04-22 02:48 before
        # eslint.config.mjs was added here).
        - "config/eslint.config.mjs"          # gates lint:eslint
        - ".gitleaks.toml"             # gates secret-scan
        - ".prettierrc"                # gates lint:format
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - "src/**/*"
        - "package.json"
        - "package-lock.json"
        - "angular.json"
        - "tsconfig*.json"
        - "config/proxy.conf.json"
        - "build/Dockerfile*"
        # Includes build/sonar-scanner.Dockerfile (extension-style name).
        # Without this glob, changing the sonar image Dockerfile didn't
        # trigger the validate stage's sonar-scanner:image job — observed
        # 2026-04-25 with commit 5293974 (mkdir fix landed but no CI ran).
        - "build/*.Dockerfile"
        - ".dockerignore"
        - "deploy/nginx.conf"
        - ".gitlab-ci.yml"
        - ".gitlab-ci/**/*"        # Phase B-4 includes — changes MUST trigger CI
        - "public/**/*"
        # E2E spec changes retrigger CI so Playwright runs against the
        # updated flow. `playwright.config.ts` + `e2e/**` tracked here.
        - "playwright.config.ts"
        - "e2e/**/*"
        # vitest.config.ts tunes the unit-test pool — changes affect
        # every unit-test job, so we must rerun the suite. Pipeline #278
        # would have caught the threads-vs-forks regression earlier
        # if this path had been in the allowlist.
        - "config/vitest.config.ts"
        # Tool config files that gate specific lint/scan jobs. Adding any
        # rule to one of these MUST trigger CI so reviewers see the new
        # signal (otherwise the change merges with stale validation,
        # exactly what happened to UI MR !68 on 2026-04-22 02:48 before
        # eslint.config.mjs was added here).
        - "config/eslint.config.mjs"          # gates lint:eslint
        - ".gitleaks.toml"             # gates secret-scan
        - ".prettierrc"                # gates lint:format
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - when: never

stages:
  - validate
  - test
  - build
  - e2e           # Playwright browser E2E against a live backend (ADR-0033)
  - quality
  - test-image    # Build + push Docker image (validation artefact — UI is not deployed to K8s per ADR-0025)
  - deploy    # Legacy PaaS deploy targets — kept manual; UI runs only on the developer laptop

variables:
  NODE_VERSION: "22"
  # Force npm to use an in-project cache dir so GitLab's `cache:` can pick it
  # up (the default $HOME/.npm is outside $CI_PROJECT_DIR and therefore not
  # archivable). Combined with the .npm/ path below, `npm ci --prefer-offline`
  # becomes fully offline on a cache hit — immune to npm-registry ECONNRESET
  # flakes like the one that failed pipeline #318 (2026-04-21).
  NPM_CONFIG_CACHE: "$CI_PROJECT_DIR/.npm"

default:
  image: node:${NODE_VERSION}-alpine
  # All jobs route to macbook-local (= the group-level runner serving
  # mirador1 — java, ui, python, shared). Updated 2026-04-25 after UI
  # main pipelines started failing with `ci_quota_exceeded` on SaaS
  # shared runners. Per global CLAUDE.md "Use local runners, never rely
  # on GitLab SaaS quota". Image jobs (docker-build, trivy, sbom, grype,
  # dockle, cosign) inherit this — they use the host Docker socket +
  # buildx/QEMU for cross-compile (arm64 host → amd64 image).
  tags:
    - macbook-local
  cache:
    key:
      files:
        - package-lock.json
    paths:
      # node_modules: the installed tree — reused on cache-hit via the
      # "skip if fresh" check below so `npm ci` doesn't wipe+reinstall.
      - node_modules/
      # .npm: npm's tarball cache — when `npm ci` DOES run, it reads tarballs
      # from here instead of the registry. Belt+suspenders: if the "skip if
      # fresh" heuristic misses, we still don't hit the network.
      - .npm/
    policy: pull-push

# ── Install ──────────────────────────────────────────────────────────────────
# Skip `npm ci` entirely on cache hit — checks a SHA of package-lock.json
# against a file written at the previous install. `npm ci` deletes node_modules
# before reinstalling, so running it on every job wasted ~1.5-2 min per job.
# On cache hit this drops install to ~1 s (just the SHA compare).
# On miss or package-lock change → regular `npm ci --prefer-offline` (itself
# accelerated by the .npm/ tarball cache). Same idiom reused across repos.
.install:
  before_script:
    - |
      set -e
      LOCK_SHA=$(sha256sum package-lock.json | cut -d' ' -f1)
      MARK=node_modules/.package-lock-sha
      if [ -d node_modules/.bin ] && [ -f "$MARK" ] && [ "$(cat "$MARK")" = "$LOCK_SHA" ]; then
        echo "✓ node_modules cache fresh ($LOCK_SHA) — skipping npm ci"
      else
        echo "▶ installing dependencies (lock SHA: $LOCK_SHA)"
        npm ci --prefer-offline --no-audit --no-fund
        echo "$LOCK_SHA" > "$MARK"
      fi

# ── Stage: validate ─────────────────────────────────────────────────────────

# ── Includes ──────────────────────────────────────────────────────────────────
#
# 7 local files per ADR-0050 Phase B-4 modularisation. `.install:` stays
# in the parent above (referenced via `extends:` from many files).
# `!reference [.kubectl-apply-ui, …]` is cross-file tolerant; the anchor
# job is in deploy.yml alongside its callers.
include:
  - local: .gitlab-ci/lint.yml      # typecheck, format, eslint, circular-deps, hadolint, renovate, openapi drift
  - local: .gitlab-ci/test.yml      # unit, unit:node20, bundle-size, e2e:kind
  - local: .gitlab-ci/build.yml     # build:production, docker-build
  - local: .gitlab-ci/security.yml  # audit, trivy, sbom, grype, dockle, cosign, gitleaks
  - local: .gitlab-ci/quality.yml   # sonarcloud, typedoc
  - local: .gitlab-ci/deploy.yml    # .kubectl-apply-ui + 5 deploy targets
# Release automation — 2026-04-23 : release-please removed (GitHub-API-only,
# 401 Bad Credentials on GitLab PAT). Replaced by bin/ship/changelog.sh +
# bin/ship/gitlab-release.sh invoked manually after a stable-v* tag push.
# See docs/reference/technologies.md → release workflow.
