<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e3a5f"/>
  <!-- Observation tower base -->
  <rect x="13.5" y="20" width="5" height="7" rx="1" fill="#60a5fa"/>
  <!-- Tower platform -->
  <rect x="11" y="17" width="10" height="3" rx="1" fill="#3b82f6"/>
  <!-- Binocular lens left -->
  <circle cx="12" cy="13" r="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="12" cy="13" r="1.5" fill="#93c5fd" opacity="0.6"/>
  <!-- Binocular lens right -->
  <circle cx="20" cy="13" r="3" fill="none" stroke="#60a5fa" stroke-width="1.5"/>
  <circle cx="20" cy="13" r="1.5" fill="#93c5fd" opacity="0.6"/>
  <!-- Bridge between lenses -->
  <rect x="15" y="12" width="2" height="2" rx="0.5" fill="#60a5fa"/>
  <!-- Radar arcs (top right) -->
  <path d="M 22 7 A 3 3 0 0 1 25 10" stroke="#34d399" stroke-width="1" fill="none" opacity="0.8"/>
  <path d="M 22 5 A 5 5 0 0 1 27 10" stroke="#34d399" stroke-width="1" fill="none" opacity="0.5"/>
</svg>
