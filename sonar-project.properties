# SonarCloud project configuration for Mirador UI (Angular 21 + TypeScript).
# SonarCloud is the SaaS version of SonarQube — free for public repos on sonarcloud.io.
#
# Setup steps:
#   1. Go to https://sonarcloud.io and log in with GitLab
#   2. Create organization "mirador1" (or use the auto-detected one)
#   3. Import the mirador-ui project
#   4. Generate a token at https://sonarcloud.io/account/security
#   5. Set SONAR_TOKEN in GitLab CI/CD group variables (mirador1 → Settings → CI/CD)
#
# Run locally: SONAR_TOKEN=xxx npm run sonar

# SonarCloud organization and project identity
sonar.organization=mirador1
sonar.projectKey=mirador1_mirador-ui
sonar.projectName=Mirador UI

# Source files — exclude test files, generated output, and dependencies
sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/docs/**,**/*.js

# Test file patterns (shown separately in SonarCloud test view)
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Coverage report — generated by `ng test --coverage` (lcov format)
# Generate first: ng test --watch=false --code-coverage
sonar.typescript.lcov.reportPaths=coverage/mirador-ui/lcov.info

# Source encoding
sonar.sourceEncoding=UTF-8
