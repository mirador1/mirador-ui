# SonarQube project configuration for Mirador UI (Angular 21 + TypeScript).
# Analyzes TypeScript, HTML, and SCSS sources.
# Run locally: npm run sonar   (requires SONAR_TOKEN env var or anonymous access)
# CI: sonar-analysis job in .gitlab-ci.yml (triggered on main and MRs)

sonar.projectKey=mirador-ui
sonar.projectName=Mirador UI
sonar.projectVersion=1.0

# Source files — exclude test files, generated output, and dependencies
sonar.sources=src
sonar.exclusions=**/*.spec.ts,**/node_modules/**,**/dist/**,**/docs/**,**/*.js

# Test file patterns (shown separately in SonarQube test view)
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Coverage report — generated by `ng test --coverage` (lcov format)
# Generate first: ng test --watch=false --code-coverage
sonar.typescript.lcov.reportPaths=coverage/mirador-ui/lcov.info

# SonarQube server — override via SONAR_HOST_URL env var for CI
sonar.host.url=http://localhost:9000

# Source encoding
sonar.sourceEncoding=UTF-8
