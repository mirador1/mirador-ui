apiVersion: v1
kind: Service
metadata:
  name: customer-ui
  namespace: app
  labels:
    app.kubernetes.io/name: customer-ui
    app.kubernetes.io/component: frontend
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: customer-ui
    app.kubernetes.io/component: frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP
