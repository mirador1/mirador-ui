# =============================================================================
# Deployment — Angular frontend served by Nginx
#
# Built by the mirador-ui GitLab CI pipeline; image pushed to the GitLab
# Container Registry under registry.gitlab.com/mirador1/mirador-ui:<sha>.
#
# envsubst placeholders:
#   ${IMAGE_REGISTRY}  — CI_REGISTRY_IMAGE from mirador-ui pipeline (no /frontend subpath)
#   ${UI_IMAGE_TAG}    — CI_COMMIT_SHA from mirador-ui pipeline
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer-ui
  namespace: app
  labels:
    app.kubernetes.io/name: customer-ui
    app.kubernetes.io/component: frontend
    app.kubernetes.io/version: "${UI_IMAGE_TAG}"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: customer-ui
      app.kubernetes.io/component: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: customer-ui
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 10   # Nginx drains quickly, no long-lived connections
      imagePullSecrets:
        - name: gitlab-registry
      containers:
        - name: customer-ui
          # IMAGE_REGISTRY = registry.gitlab.com/mirador1/mirador-ui (no /frontend subpath)
          image: "${IMAGE_REGISTRY}:${UI_IMAGE_TAG}"
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 80
          resources:
            # Nginx serving static files: low CPU, minimal memory
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
