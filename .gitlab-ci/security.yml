# .gitlab-ci/security.yml — extracted 2026-04-22 from .gitlab-ci.yml
# Phase B-4 CI modularisation (ADR-0050). Contains: security, trivy, secret-scan, sbom, grype, dockle, cosign.
# The parent `.gitlab-ci.yml` keeps workflow/stages/variables/default
# + the `.install:` hidden job used via `extends:` across files.

security:audit:
  stage: quality
  extends: .install
  script:
    - npm audit --audit-level=high || true
    - |
      echo "── Checking for sensitive files ──"
      SENSITIVE=$(find src -name ".env*" -o -name "*.pem" -o -name "*.key" -o -name "credentials*" 2>/dev/null)
      if [ -n "$SENSITIVE" ]; then
        echo "FAIL: Sensitive files found in src/:"
        echo "$SENSITIVE"
        exit 1
      fi
      echo "OK: No sensitive files in src/"
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── SonarCloud ───────────────────────────────────────────────────────────────
# Static code analysis via SonarCloud (SaaS, free for public repos).
# sonar-project.properties at the repo root sets the org/project key.
#
# Prerequisites (one-time setup):
#   1. Create org at https://sonarcloud.io (log in with GitLab)
#   2. Import the mirador-ui project (auto-detected from GitLab)
#   3. Generate a token at https://sonarcloud.io/account/security
#   4. Set SONAR_TOKEN in GitLab group CI/CD variables (mirador1 → Settings → CI/CD)
#
# No SONAR_HOST_URL needed — hardcoded to sonarcloud.io.
trivy:scan:
  # Scans the freshly built frontend Docker image for OS + CVEs using Trivy.
  # allow_failure:true — CVEs are tracked informationally, not build-blocking.
  stage: test-image
  # aquasec/trivy no longer publishes :latest (since ~0.60). Pin a real tag.
  # entrypoint:[""] overrides `trivy` default entrypoint — GitLab CI wraps
  # the script in `sh -c` which trivy rejects as `unknown command "sh"`.
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  # TODO: flip to false by 2026-07-20 (90d) — ran green 3/3 on main
  # (pipelines #294/#296/#300 on 2026-04-19) with --exit-code 0, so
  # the shield is currently decorative. Coordinated flip: switch
  # --exit-code to 1 on HIGH/CRITICAL AND drop allow_failure at the
  # same time, so the job goes from informational to a real CVE gate.
  # Mirrors svc trivy:scan policy — keep both repos in sync.
  allow_failure: true
  script:
    # trivy pulls directly from the registry with its own HTTP client — no
    # Docker daemon needed.
    - |
      trivy image \
        --exit-code 0 \
        --severity HIGH,CRITICAL \
        --format json \
        --output trivy-report.json \
        --username "$CI_REGISTRY_USER" \
        --password "$CI_REGISTRY_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - |
      trivy image \
        --exit-code 0 \
        --severity HIGH,CRITICAL \
        --username "$CI_REGISTRY_USER" \
        --password "$CI_REGISTRY_PASSWORD" \
        "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - trivy-report.json

# ── hadolint — Dockerfile lint ────────────────────────────────────────────────
secret-scan:
  stage: validate
  image:
    name: zricethezav/gitleaks:v8.21.4
    entrypoint: [""]
  rules:
    - when: on_success
  script:
    - gitleaks detect --source . --config .gitleaks.toml --redact --verbose
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
    expire_in: 1 week

# ── Renovate config lint ──────────────────────────────────────────────────────
sbom:syft:
  stage: test-image
  image:
    name: aquasec/trivy:0.69.3
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  retry:
    max: 1
    when: runner_system_failure
  script:
    - trivy registry login "$CI_REGISTRY" --username "$CI_REGISTRY_USER" --password "$CI_REGISTRY_PASSWORD"
    - trivy image --format cyclonedx --output bom.cdx.json "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - trivy image --format spdx-json --output bom.spdx.json "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
  artifacts:
    when: always
    expire_in: 90 days
    paths:
      - bom.cdx.json
      - bom.spdx.json
    reports:
      cyclonedx: bom.cdx.json

# ── Grype CVE scan (reads SBOM) ───────────────────────────────────────────────
grype:scan:
  stage: test-image
  image:
    # 2026-04-23: bumped v0.87.0 → v0.111.0-debug (matches svc).
    # v0.87.0 (non-debug) doesn't ship /bin/sh so GitLab's `script:`
    # wrapper fails with "exec: sh: executable file not found"
    # (pipeline #403 job evidence). v0.111.0-debug is multi-arch
    # (amd64 + arm64 + ppc64le + s390x) AND ships /bin/sh.
    name: anchore/grype:v0.111.0-debug
    entrypoint: [""]
  tags:
    - macbook-local
  needs:
    - job: sbom:syft
      artifacts: true
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  # Shield removed 2026-04-24 — root cause of "grype: not found" was
  # that the v0.111.0-debug image installs grype at /grype (root) but
  # /grype is NOT on the PATH (busybox PATH is /usr/local/sbin:/usr/
  # local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/busybox). Verified locally
  # via `docker run --rm --entrypoint sh anchore/grype:v0.111.0-debug
  # -c "which grype; ls /grype"` → /grype exists, which grype empty.
  # Calling /grype with absolute path fixes it without env tweaks.
  script:
    - /grype sbom:bom.cdx.json --fail-on high --output table
    - /grype sbom:bom.cdx.json --output json > grype-report.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - grype-report.json

# ── Dockle — CIS Docker / container policy checks ────────────────────────────
# Pattern adopted 2026-04-24 from the svc repo's dockle job (battle-tested
# 7/7 green runs on main 2026-04-21). Replaces the earlier broken approach
# (image: goodwithtech/dockle:v0.4.15 + DOCKLE_PLATFORM env var) which
# failed every UI main pipeline since the 2026-04-23 image bump because
# dockle 0.4.15 doesn't support `--image-platform` and defaults to the
# runner's arch (arm64 macbook-local). The image is built amd64-only
# (ADR-0023: GKE nodes are amd64) → "no image found in image index for
# architecture arm64".
#
# Tarball workaround : `docker pull --platform linux/amd64` selects the
# amd64 manifest explicitly, `docker save` exports to a tar file, and
# `dockle --input` reads the tar without ever touching the registry's
# manifest list. Dockle binary itself is arch-agnostic in --input mode.
# Shield (`allow_failure: true`) removed — same logic as svc, where the
# pattern proved stable. Re-shield only if a known false positive lands
# and we're waiting for an upstream fix.
dockle:
  stage: test-image
  image: docker:28
  tags:
    - macbook-local
  needs:
    - job: docker-build
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  variables:
    DOCKLE_VERSION: "0.4.15"
  before_script:
    - apk add --no-cache curl ca-certificates
    - |
      # Install dockle binary for the runner's native arch — dockle is
      # arch-agnostic when reading from a tarball (--input), so the
      # binary just needs to be runnable on the runner host.
      ARCH="$(uname -m)"
      case "$ARCH" in
        x86_64)  DK_ARCH=64bit ;;
        aarch64|arm64) DK_ARCH=ARM64 ;;
        *) echo "unsupported arch: $ARCH"; exit 1 ;;
      esac
      curl -sSL -o /tmp/dockle.tgz \
        "https://github.com/goodwithtech/dockle/releases/download/v${DOCKLE_VERSION}/dockle_${DOCKLE_VERSION}_Linux-${DK_ARCH}.tar.gz"
      tar -xzf /tmp/dockle.tgz -C /usr/local/bin dockle
      dockle --version
  script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    # Explicit --platform selects the amd64 variant of a single-platform
    # image without trying the (non-existent) arm64 variant.
    - |
      docker pull --platform linux/amd64 \
        "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
      docker save "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -o /tmp/image.tar
    - dockle --exit-code 0 --input /tmp/image.tar --format json --output dockle-report.json
    - dockle --exit-code 0 --input /tmp/image.tar
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - dockle-report.json

# ── cosign keyless signing via GitLab OIDC + Sigstore Fulcio ──────────────────
# Image choice: the upstream `gcr.io/projectsigstore/cosign:v2.5.0` is fully
# distroless — no `sh` — so GitLab's runner wrapper fails instantly with
# `exec: "sh": executable file not found` (pipeline #249 root cause).
# Download the binary into a plain alpine container instead; this also
# lets us pick the right arch automatically via `uname -m`.
cosign:sign:
  stage: test-image
  image: alpine:3.22
  tags:
    - macbook-local
  needs:
    - job: docker-build
  id_tokens:
    SIGSTORE_ID_TOKEN:
      aud: sigstore
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
  # TODO: flip to false by 2026-07-20 (90d) — ran green 3/3 on main
  # (pipelines #294/#296/#300 on 2026-04-19). Blocker before flip: UI
  # does NOT have a cosign:verify gate (unlike svc) — removing the
  # shield with no verify means a real signing failure gets buried.
  # Plan: (1) add cosign:verify mirroring svc, (2) flip both job
  # shields to false once verify is green.
  allow_failure: true
  variables:
    COSIGN_YES: "true"
    COSIGN_EXPERIMENTAL: "1"
    COSIGN_VERSION: "v2.5.0"
  before_script:
    - apk add --no-cache curl ca-certificates
    - |
      ARCH=$(uname -m)
      case "$ARCH" in
        aarch64) COSIGN_ARCH=arm64 ;;
        x86_64)  COSIGN_ARCH=amd64 ;;
        *) echo "unsupported arch $ARCH" && exit 1 ;;
      esac
      curl -sSLo /usr/local/bin/cosign \
        "https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}/cosign-linux-${COSIGN_ARCH}"
      chmod +x /usr/local/bin/cosign
      cosign version
  script:
    - cosign login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD"
    - cosign sign --identity-token "$SIGSTORE_ID_TOKEN" "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"

