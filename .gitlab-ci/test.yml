# .gitlab-ci/test.yml — extracted 2026-04-22 from .gitlab-ci.yml
# Phase B-4 CI modularisation (ADR-0050). Contains: unit-tests, unit-tests, bundle-size-check, e2e.
# The parent `.gitlab-ci.yml` keeps workflow/stages/variables/default
# + the `.install:` hidden job used via `extends:` across files.

unit-tests:
  stage: test
  extends: .install
  # vitest's fork-pool workers can time out under runner CPU pressure when
  # multiple pipelines schedule concurrently (pipeline #257 died with
  # "Timeout waiting for worker to respond" after 60 s with zero tests run).
  # One retry on runner_system_failure absorbs the flake; real test
  # failures still exit 1 and won't loop.
  retry:
    max: 1
    when: runner_system_failure
  script:
    - npx ng test --watch=false
  coverage: '/All files\s*\|\s*[\d.]+/'
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Node 20 compat ──────────────────────────────────────────────────────────
unit-tests:node20:
  stage: test
  extends: .install
  image: node:20-alpine
  # Same flake class as unit-tests above — vitest forks timing out on
  # runner pressure. Identical retry policy.
  retry:
    max: 1
    when: runner_system_failure
  script:
    - npx ng test --watch=false
  rules:
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: build ─────────────────────────────────────────────────────────────
bundle-size-check:
  stage: quality
  needs: ["build:production"]
  script:
    - |
      MAX_SIZE_KB=500
      MAIN_JS=$(ls dist/mirador-ui/browser/main-*.js 2>/dev/null | head -1)
      if [ -z "$MAIN_JS" ]; then
        echo "WARN: No main-*.js found in dist, skipping bundle size check"
        exit 0
      fi
      INITIAL=$(du -sk "$MAIN_JS" | cut -f1)
      echo "Initial bundle: ${INITIAL}kB (max: ${MAX_SIZE_KB}kB)"
      if [ "$INITIAL" -gt "$MAX_SIZE_KB" ]; then
        echo "WARN: Initial bundle exceeds ${MAX_SIZE_KB}kB"
      else
        echo "OK: Bundle within budget"
      fi
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
e2e:kind:
  stage: e2e
  # macbook-local gives us Docker-in-Docker so docker-compose works for
  # the backend deps (postgres + redis + kafka). Shared GitLab runners
  # don't expose /var/run/docker.sock.
  tags:
    - macbook-local
  # Large image — Playwright + Chromium + Node + Java 25. We ship a
  # custom image in a future iteration; for now use the official
  # Playwright container (ships Chromium pre-installed) and add Java
  # + Maven in the before_script.
  image: mcr.microsoft.com/playwright:v1.59.1-jammy
  needs:
    - job: build:production
      artifacts: true    # consume the dist/ artefact produced upstream
  rules:
    # MR pipelines + default branch + weekly schedule (detects slow
    # upstream drift in Spring / Angular minor bumps).
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_PIPELINE_SOURCE == "schedule"
  # TODO: flip to false by 2026-05-25 (30d) — current state 2026-04-25:
  # 3-step plan COMPLETE (steps 1+2 in commit 2fbdb17, step 3 in this
  # commit). Verification pending : 5 consecutive main runs must show
  # e2e:kind green before flipping `allow_failure: true` → `false` per
  # ADR-0033 "10 green runs before flip" (the 5/5 here is an interim
  # signal ; the 10-run gate stays the formal exit criterion).
  #
  # Steps SHIPPED :
  #   1. e2e-debug/ artifact bundle — actuator-health.json + backend
  #      app.log + compose container states + per-container
  #      `docker logs --tail=200`. Captured in after_script BEFORE
  #      compose teardown so containers haven't disappeared yet.
  #   2. helpers/wait-for-backend.ts — polls /actuator/health 25s +
  #      fallback to /actuator/health/liveness 30s, called in
  #      beforeEach of every @golden spec. Catches the "Spring
  #      listening but composite DOWN" race window.
  #   3. customer-crud.spec.ts — bumped the "Created → ID" toast
  #      assertion timeout 10s → 25s. Root cause measured from svc
  #      KafkaCustomerEventPublisher : `kafkaTemplate.send().get(5s)`
  #      under @Retry(3 attempts, 200/400ms backoff) + fallback
  #      ≈ 15.6 s worst case when Kafka is in rebootstrap loop
  #      (KRaft single-node, broker registration incomplete on this
  #      runner — see line 281-285 below). 10s was structurally
  #      doomed ; 25s gives 9s headroom for runner pressure.
  #
  # If 5/5 main runs still RED after step 3, scope-out per CLAUDE.md
  # "surgical fixes, not allow_failure bypasses" rule (c) :
  #   rules:
  #     - if: $CI_COMMIT_BRANCH == "main"
  #       when: never
  #     - when: manual
  # Keeps the job manually triggerable for diagnostics, no longer
  # gates the main pipeline. ADR-0033 stays the canonical reference.
  allow_failure: true
  variables:
    # Backend service repo — cloned next to the UI checkout so we can
    # run `./run.sh app` against postgres/kafka/redis in compose. Token
    # is read-only, scoped to the `mirador-service` project.
    SERVICE_REPO: "https://gitlab.com/mirador1/mirador-service.git"
    E2E_BASE_URL: "http://localhost:4200"
  before_script:
    # Install Java 25 + Maven (Playwright image is Debian jammy-based).
    # Also docker CLI + compose plugin: the runner mounts /var/run/docker.sock
    # but the Playwright image ships no docker client, so any `docker compose`
    # invocation in the script fails with `command not found`. We use the
    # official Docker apt repo for compose v2 (Ubuntu's docker.io ships only
    # docker-compose v1 which is EOL).
    - apt-get update -qq && apt-get install -y -qq curl gnupg openjdk-21-jdk-headless maven
    - install -m 0755 -d /etc/apt/keyrings
    - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    - echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu jammy stable" > /etc/apt/sources.list.d/docker.list
    - apt-get update -qq && apt-get install -y -qq docker-ce-cli docker-compose-plugin
    - npm ci --prefer-offline
  script:
    - |
      set -euxo pipefail

      # 1. Bring up the backend's infra deps via the service repo's
      #    docker-compose.yml. We only need db + kafka + redis —
      #    the rest (observability, Keycloak) is demo eye candy.
      # The Postgres service is named `db` in svc's compose file (not
      # `postgres`); calling it by the wrong name fails fast with
      # `no such service`.
      # The compose file references DB_USER/DB_PASSWORD/etc from .env
      # which doesn't exist in the fresh clone — we set sane defaults
      # so the warnings don't cause empty-string container args that
      # crash on first connection.
      # svc's compose file pins container_names AND publishes ports
      # to the host (5432/9092/6379), which collides with the
      # developer's local dev stack on macbook-local (shared docker
      # socket). Three sed-strips make the compose CI-safe:
      #   1. `container_name:` — global names, can't run two stacks
      #   2. `^    ports:` + indented children — host port bindings
      #      collide if local dev has redis/postgres/kafka on the
      #      same ports.
      #   3. `expose:` already present in svc's compose, so
      #      service-to-service network calls keep working.
      # Combined with `-p ci-${CI_JOB_ID}` we get a fully isolated
      # stack on a private bridge network, no host port footprint.
      git clone --depth=1 "$SERVICE_REPO" /tmp/svc
      sed -i '/^[[:space:]]*container_name:/d' /tmp/svc/docker-compose.yml
      # Strip `ports:` block (the line + its `- "x:y"` children up
      # to the next sibling key). Python is more reliable than sed
      # for indented YAML blocks. Also strips the init-sonar.sql
      # bind mount line — the file may exist in svc's main but the
      # bind-mount source resolution is fragile, and SonarQube DB
      # provisioning isn't needed for e2e:kind (we don't run sonar
      # in this job). Pipeline #2478482879 evidence : init-sonar.sql
      # bind became a directory at runtime → postgres init crashed
      # with "psql: ... could not read from input file: Is a directory".
      python3 -c "
      import re, sys
      p = '/tmp/svc/docker-compose.yml'
      with open(p) as f: txt = f.read()
      # Match `    ports:` then any number of more-indented lines.
      txt = re.sub(r'^( +)ports:\s*\n(\1 +- .*\n)+', '', txt, flags=re.MULTILINE)
      # Drop the init-sonar.sql bind mount (single line under volumes:)
      txt = re.sub(r'^.*init-sonar\.sql.*\n', '', txt, flags=re.MULTILINE)
      with open(p, 'w') as f: f.write(txt)
      "
      COMPOSE_PROJECT="ci-${CI_JOB_ID}"
      # Earlier attempt with `--wait --wait-timeout 120` regressed the
      # job (pipeline #2478423586 : postgres exited(1) within 2 s of
      # start, root cause unclear — possibly docker-compose --wait
      # interacting badly with kafka's longer healthcheck on this
      # runner). Reverted to plain `up -d` + explicit pg_isready
      # poll loop below : more verbose but more diagnosable + matches
      # the existing pattern used for /actuator/health waiting later
      # in this script.
      (cd /tmp/svc && \
        DB_PORT=5432 DB_USER=mirador DB_PASSWORD=mirador DB_NAME=mirador \
        SERVER_PORT=8080 \
        docker compose -p "$COMPOSE_PROJECT" -f docker-compose.yml up -d db kafka redis)

      # Explicit pg_isready loop : was missing entirely before, so the
      # script raced past `up -d` and Spring Boot's Flyway init tried
      # to connect before postgres was ready → "Connection attempt
      # failed" backend boot crash (pipeline #2478105896 evidence).
      # 60 × 2 s = up to 2 min ceiling. Postgres typically healthy in
      # 5-10 s on a clean run ; the 2-min cap fails fast with a clear
      # error + grabs container logs for diagnosis.
      DB_CTR="ci-${CI_JOB_ID}-db-1"
      for i in $(seq 1 60); do
        docker exec "$DB_CTR" pg_isready -U mirador -d mirador >/dev/null 2>&1 && break
        [ $i -eq 60 ] && {
          echo "FAIL: postgres not ready after 120 s — last container logs :"
          docker logs --tail=50 "$DB_CTR" || true
          exit 1
        }
        sleep 2
      done
      echo "postgres ready (waited ~$((i * 2)) s)"

      # 2. Connect THIS job container to the compose bridge network
      #    so Spring Boot can reach `db`, `kafka`, `redis` by docker
      #    DNS — no host port footprint needed.
      #
      #    Pipeline #2478601087 evidence (after wave 6 getent diagnostic) :
      #    `docker inspect $(hostname) → no such object`. GitLab runner
      #    sets the job container's HOSTNAME via --hostname (e.g.
      #    runner-yt-cpyt8r-project-81241927-concurrent-1) but that's
      #    NOT the docker container NAME — so `docker network connect
      #    $NET $(hostname)` was failing silently for every previous run.
      #    The "everything works" memory was actually hosts-mode-fallback
      #    or coincidence.
      #
      #    Fix : derive the real container ID from /proc/self/cgroup
      #    (works on cgroup v1 and v2 — the 64-hex-char container ID is
      #    embedded in the cgroup hierarchy regardless of layout).
      #    Fall back to hostname if cgroup parsing fails (degraded mode).
      # Wave 9 : both /proc/self/cgroup and $(hostname) fail to give a
      # docker-recognised name. Pipeline #2478827101 evidence : grep
      # returned empty (cgroup v2 doesn't have the 64-char ID inline)
      # AND $(hostname) returned `runner-yt-cpyt8r-...` which docker
      # daemon doesn't recognise (GitLab sets --hostname but the actual
      # container NAME is longer with a `-build-N` suffix).
      #
      # New strategy : use `docker ps --filter name=$(hostname)` to find
      # the actual container name (partial match on hostname prefix).
      # Falls back through the chain :
      #   1. docker ps filter on hostname prefix → real container name
      #   2. /proc/self/cgroup 64-char ID extraction
      #   3. raw $(hostname) (degraded — likely fails connect)
      JOB_CTR=$(docker ps --filter "name=$(hostname)" --format '{{.Names}}' 2>/dev/null | head -1)
      JOB_CTR="${JOB_CTR:-$(grep -oE '[a-f0-9]{64}' /proc/self/cgroup 2>/dev/null | head -1 || true)}"
      JOB_CTR="${JOB_CTR:-$(hostname)}"
      NET="${COMPOSE_PROJECT}_default"
      echo "Job container ID : $JOB_CTR (from /proc/self/cgroup)"
      # `|| true` retained for idempotency (already-attached network is
      # not an error). stderr is visible so real attach errors surface.
      docker network connect "$NET" "$JOB_CTR" || true
      # Verify Spring Boot can resolve `db` BEFORE launching the app —
      # cheaper to fail here with a clear DNS error than to wait 10 min
      # for Flyway to time out.
      if ! getent hosts db >/dev/null 2>&1; then
        echo "FAIL: hostname 'db' not resolvable from job container" >&2
        echo "Job container : $JOB_CTR" >&2
        echo "Networks attached :" >&2
        docker inspect "$JOB_CTR" --format '{{range $k, $v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}' >&2 || true
        echo "Compose network containers :" >&2
        docker network inspect "$NET" --format '{{range .Containers}}{{.Name}}{{"\n"}}{{end}}' >&2 || true
        exit 1
      fi
      echo "DNS OK : db → $(getent hosts db | awk '{print $1}')"

      # 3. Compile + start the Spring Boot app in the background. The
      #    `./run.sh app` script blocks on the foreground; we daemonise
      #    with `nohup &` and wait for /actuator/health to return UP.
      #    SPRING_* env vars point at the compose service names,
      #    bypassing the default localhost: addresses that worked
      #    only on the developer's host-mode dev stack.
      # `-Dcompat` activates the SB4+Java 21 profile in svc's pom.xml
      # — the default profile targets Java 25 which the playwright
      # image's openjdk-21 can't compile (release version 25 not
      # supported). Installing JDK 25 in the container would add ~500
      # MB and slow every CI run; -Dcompat is a 4-byte change with
      # the same runtime behavior for our integration purposes.
      (cd /tmp/svc && \
        SPRING_DATASOURCE_URL="jdbc:postgresql://db:5432/mirador" \
        SPRING_DATASOURCE_USERNAME=mirador \
        SPRING_DATASOURCE_PASSWORD=mirador \
        SPRING_DATA_REDIS_HOST=redis \
        SPRING_DATA_REDIS_PORT=6379 \
        SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092 \
        nohup mvn -q -Dcompat -DskipTests spring-boot:run > /tmp/app.log 2>&1 &)
      # 300 × 2 s = up to 10 min ceiling. Cold mvn compile +
      # Spring Boot startup measured at 2-5 min under runner
      # pressure (pipelines #402-403 both timed out at 60×2=120 s
      # BEFORE compilation finished → empty /tmp/app.log on
      # failure). Happy path unchanged (exits on first 2xx).
      # Progress line every ~30 s so the trace isn't a silent gap.
      # Wave 10 : poll /actuator/health/liveness instead of /actuator/health.
      # Pipeline #2478860588 evidence : Spring Boot started, postgres
      # connected, network DNS worked — but /actuator/health composite
      # never returned UP because Kafka health indicator is stuck in
      # rebootstrap loop (kafka:9092 reachable but broker registration
      # incomplete in CI's KRaft single-node mode).
      # /actuator/health/liveness only checks "process is alive", not
      # downstream dependencies → returns UP as soon as Spring's context
      # is initialised, sufficient for e2e tests to start.
      for i in $(seq 1 300); do
        curl -sSf http://localhost:8080/actuator/health/liveness >/dev/null 2>&1 && break
        [ $((i % 15)) -eq 0 ] && echo "…waiting for /actuator/health/liveness (t+${i}×2s, app.log: $(wc -l < /tmp/app.log 2>/dev/null || echo 0) lines)"
        sleep 2
      done
      curl -sSf http://localhost:8080/actuator/health/liveness || { tail -80 /tmp/app.log; exit 1; }

      # 3. Serve the Angular production build on :4200.
      #    Wave 11 (pipeline #2479025472 evidence) : `http-server -s`
      #    has NO SPA fallback — `-s` is "silent", not "single-page".
      #    Requests to client-side routes like `/login` returned HTTP
      #    404 because the file `dist/mirador-ui/browser/login` doesn't
      #    exist on disk. Playwright then loaded an empty 404 body and
      #    timed out waiting for `getByLabel('Username')` (login form
      #    never rendered). All 3 @golden tests failed for the same
      #    reason : login.spec, customer-crud.spec, health.spec all
      #    start with `goto('/login')`.
      #
      #    `npx serve -s` (npm package `serve`, Vercel) DOES rewrite
      #    not-found requests to `index.html` — `-s` here means
      #    `--single` (SPA mode). Verified locally : http-server
      #    returns 404 on /login, serve -s returns 200 with
      #    index.html → Angular router resolves /login → form renders.
      #    `-l 4200` listen on port 4200 (replaces http-server's `-p`).
      npx --yes serve -s dist/mirador-ui/browser -l 4200 &
      # Probe `/login` (a client-side route) not `/` so we exercise
      # the SPA fallback path — catches the same regression class
      # that broke wave 11 if `serve` ever gets swapped for a non-SPA
      # static server again.
      for i in $(seq 1 30); do
        curl -sSf http://localhost:4200/login >/dev/null 2>&1 && break
        sleep 1
      done

      # 4. Run the Playwright golden-path suite only. `@demo` is the
      #    recording spec used by bin/record-demo.sh for the README
      #    GIF and takes ~30 s of cosmetic delays — exclude in CI.
      #    retries:2 + CI env var flips to CI mode (see playwright.config.ts).
      CI=1 npx playwright test --grep @golden
  after_script:
    # Step 1 of e2e:kind 3-step plan (TODO 2026-05-25, see line ~82).
    # When @golden specs fail, screenshots-only artifacts don't show
    # WHY the backend was unhealthy — the next debugging pass reads
    # Playwright's "Created → ID never appeared" without a way to
    # tell if the POST hung server-side, returned 503, or never even
    # left the browser. This block dumps the smoking gun BEFORE
    # compose tears down (otherwise containers are gone and we lose
    # the chance to capture their state).
    #
    # Cost : ~3 s on every run (success or fail), ~5 KB of artifacts
    # added. The `|| true` after each capture means a failed dump
    # never blocks compose teardown — the job's exit code stays
    # owned by Playwright.
    - |
      set +e
      mkdir -p e2e-debug
      echo "=== capturing debug artifacts at $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="

      # /actuator/health composite — JSON shows which downstream
      # indicator (db/kafka/redis/diskSpace) was DOWN at failure time.
      # Curl with --max-time so a hung actuator doesn't block the rest.
      curl -sS --max-time 5 http://localhost:8080/actuator/health \
        > e2e-debug/actuator-health.json 2>&1 || \
        echo '{"error":"actuator-health unreachable"}' > e2e-debug/actuator-health.json
      curl -sS --max-time 5 http://localhost:8080/actuator/health/liveness \
        > e2e-debug/actuator-liveness.json 2>&1 || \
        echo '{"error":"actuator-liveness unreachable"}' > e2e-debug/actuator-liveness.json
      curl -sS --max-time 5 http://localhost:8080/actuator/health/readiness \
        > e2e-debug/actuator-readiness.json 2>&1 || \
        echo '{"error":"actuator-readiness unreachable"}' > e2e-debug/actuator-readiness.json

      # Backend stdout/stderr — Spring runs as a `nohup mvn spring-boot:run`
      # in the SAME container (not via docker compose), so the log lives
      # on disk at /tmp/app.log. `|| true` covers the case where the
      # script crashed before launching mvn.
      cp /tmp/app.log e2e-debug/backend-app.log 2>/dev/null || \
        echo "no /tmp/app.log (backend never started)" > e2e-debug/backend-app.log

      # Compose container states + last 200 lines of each container.
      # docker ps with the project filter shows what was actually running
      # at failure time (kafka can crash silently mid-run on cgroup v2).
      docker ps --filter "label=com.docker.compose.project=ci-${CI_JOB_ID}" \
        --format 'table {{.Names}}\t{{.Status}}\t{{.Ports}}' \
        > e2e-debug/compose-ps.txt 2>&1 || true
      for ctr in db kafka redis; do
        docker logs --tail=200 "ci-${CI_JOB_ID}-${ctr}-1" \
          > "e2e-debug/compose-${ctr}.log" 2>&1 || \
          echo "container ci-${CI_JOB_ID}-${ctr}-1 not running" \
          > "e2e-debug/compose-${ctr}.log"
      done

      ls -la e2e-debug/ || true
      set -e
    # Always stop compose — leaking postgres on the runner would
    # accumulate disk. `|| true` because the job may fail before
    # `docker compose up` ran. `-p ci-${CI_JOB_ID}` matches the
    # project namespace from before_script so we tear down THIS
    # job's stack only (no risk of nuking a parallel CI job's
    # containers, nor the developer's local dev stack).
    - (cd /tmp/svc && docker compose -p "ci-${CI_JOB_ID}" -f docker-compose.yml down -v) || true
  artifacts:
    when: always
    paths:
      - playwright-report/
      - test-results/
      # Step 1 debug bundle — actuator JSON + backend log + compose
      # container states. Captured in after_script BEFORE compose down.
      # Reviewer's first stop after a red @golden : open `e2e-debug/`
      # in the artifact browser, check actuator-health.json for which
      # indicator was DOWN, then backend-app.log for the matching
      # stack trace.
      - e2e-debug/
    reports:
      junit: playwright-report/results.xml
    expire_in: 14 days

# ── Stage: quality ───────────────────────────────────────────────────────────
# Shield removed 2026-04-20 — the script itself never exits non-zero
# (even when the bundle exceeds MAX_SIZE_KB it only echoes WARN and
# returns 0), so `allow_failure: true` was redundant. Ran green 5+
# consecutive pipelines on main. If we ever harden the check to exit 1
# on budget-exceeded, that's a deliberate decision worth surfacing as
# a red job; re-add the shield only with a dated exit ticket.
