# .gitlab-ci/quality.yml — extracted 2026-04-22 from .gitlab-ci.yml
# Phase B-4 CI modularisation (ADR-0050). Contains: sonar-scanner:image,
# sonarcloud, typedoc.
# The parent `.gitlab-ci.yml` keeps workflow/stages/variables/default
# + the `.install:` hidden job used via `extends:` across files.

# ── Custom SonarScanner image (waves 1-10 root cause fix, 2026-04-25) ────────
#
# Build the thin custom image at build/sonar-scanner.Dockerfile and push
# to the GitLab Container Registry under
#   $CI_REGISTRY_IMAGE/sonar-scanner:11.5.0.2154
#
# WHY a custom image (full history in build/sonar-scanner.Dockerfile):
#   The upstream sonarsource/sonar-scanner-cli:11.x ships /home/scanner-cli
#   owned by root with mode 0755 — the runtime user can't mkdir
#   ~/.tree-sitter/lib. Waves 7-10 (HOME override, chmod, XDG_DATA_HOME,
#   symlink) all failed because Node's os.homedir() reads /etc/passwd
#   (ignores HOME) and the symlink commands ran as a non-root user against
#   a root-owned directory. Only chowning the directory at image build
#   time (while still root) closes the loop.
#
# WHY a separate build job (and not just a one-off manual push):
#   - Reproducible: every change to the Dockerfile rebuilds the image
#     in CI under the same conditions.
#   - Path-filtered: runs ONLY when build/sonar-scanner.Dockerfile changes,
#     so day-to-day commits don't pay the rebuild cost (~2-3 min).
#   - Audit trail: GitLab pipeline log shows exactly which commit produced
#     each image tag.
#
# Tagged with the full sonar-scanner-cli version (11.5.0.2154) NOT a moving
# `:latest` — per CLAUDE.md "pin every upstream reference." When a new
# upstream version is desired, bump build/sonar-scanner.Dockerfile FROM
# line + this tag in the same commit, ship as a dedicated MR.
sonar-scanner:image:
  stage: validate
  # Routed to macbook-local because docker-build for amd64-target runs
  # there (CI quota policy ADR-0004 forbids saas-linux-medium-amd64).
  # Apple Silicon arm64 host → amd64 image via QEMU + buildx, same
  # pattern as the main docker-build job below.
  tags:
    - macbook-local
  image: docker:28
  variables:
    # Pinned to match the FROM line in build/sonar-scanner.Dockerfile.
    # When bumping the upstream version, change BOTH lines in the same commit.
    SONAR_SCANNER_IMAGE_TAG: "11.5.0.2154"
  rules:
    # Build the image whenever the Dockerfile changes (MR or main).
    # Runs first on dev/main when the file is modified; downstream
    # sonarcloud job picks up the resulting image via $CI_REGISTRY_IMAGE.
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - build/sonar-scanner.Dockerfile
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - build/sonar-scanner.Dockerfile
    # Manual trigger on any branch — useful when retagging or rebuilding
    # without an actual Dockerfile diff (e.g. base image security update
    # that doesn't change our layer's content).
    - when: manual
      allow_failure: true   # manual trigger; pipeline still passes if the user doesn't run it
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
    - docker run --privileged --rm tonistiigi/binfmt --install amd64 || true
    - docker buildx create --name multi --use 2>/dev/null || docker buildx use multi
  script:
    - |
      docker buildx build \
        -f build/sonar-scanner.Dockerfile \
        --platform linux/amd64 \
        --tag "$CI_REGISTRY_IMAGE/sonar-scanner:$SONAR_SCANNER_IMAGE_TAG" \
        --label "org.opencontainers.image.revision=$CI_COMMIT_SHA" \
        --label "org.opencontainers.image.created=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
        --push \
        .

sonarcloud:
  stage: quality
  # Custom image with a writable /home/scanner-cli (see above + the
  # Dockerfile at build/sonar-scanner.Dockerfile for the full why).
  # The tag MUST match SONAR_SCANNER_IMAGE_TAG in sonar-scanner:image.
  image:
    name: $CI_REGISTRY_IMAGE/sonar-scanner:11.5.0.2154
    entrypoint: [""]
  needs:
    # If the Dockerfile changed in this MR, the image needs to be
    # (re)built first. `optional: true` so on the 99 % of pipelines
    # where the Dockerfile didn't change, the image-build job didn't
    # run and sonarcloud uses the previously-pushed registry image.
    - job: sonar-scanner:image
      optional: true
    - job: unit-tests
    - job: build:production
    # ESLint SARIF — ingested by sonar via config/sonar-project.properties
    # → sonar.sarifReportPaths. `optional: true` so the sonar step still
    # runs on branches that didn't trigger lint:eslint (path-filtered).
    - job: lint:eslint
      artifacts: true
      optional: true
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"    # full clone for accurate blame/line info
  cache:
    key: sonar-${CI_COMMIT_REF_SLUG}
    paths:
      - .sonar/cache
  script:
    # config/sonar-project.properties provides org/projectKey; token from CI variable.
    # -Dproject.settings points the scanner at the moved config file.
    #
    # sonar.javascript.node.maxspace=8192 + node.timeout=600 — the JS bridge
    # subprocess (analyses .ts/.js) needs ≥2GB heap for our codebase and
    # the default 300s startup timeout is too tight on a busy macbook-local
    # runner; pipeline #271 failed with "Failed to start the bridge server
    # (300s timeout)" before we landed on these values. Bumped from 4096
    # to 8192 on 2026-04-24 to give the bridge more headroom (kept here
    # even after the tree-sitter root cause was fixed — the larger heap
    # is still better hygiene on a 32 GB runner).
    #
    # workerCount=2 (default 4) — reduces peak concurrent subprocess
    # memory; with maxspace=8192 the peak budget is 16 GB instead of
    # 32 GB. Trade-off : ~1.5-2× longer wall-clock but stable.
    #
    # Note : the wave 7-10 `mkdir`/`rm`/`ln -sf` workarounds for
    # /home/scanner-cli/.tree-sitter were REMOVED 2026-04-25 once
    # build/sonar-scanner.Dockerfile chowned that directory at image
    # build time (while still root). The custom image now has a
    # writable /home/scanner-cli, so the JS bridge subprocess can
    # mkdir its tree-sitter cache without further ceremony.
    - sonar-scanner
        -Dproject.settings=config/sonar-project.properties
        -Dsonar.host.url="https://sonarcloud.io"
        -Dsonar.token="${SONAR_TOKEN}"
        -Dsonar.javascript.node.maxspace=8192
        -Dsonar.javascript.node.timeout=600
        -Dsonar.javascript.workerCount=2
  # Retry on `runner_system_failure` ONLY (per CLAUDE.md "Retries are only
  # for runner_system_failure"). Protects against the legitimate runner
  # Docker-daemon flakes that occasionally land mid-Sonar-analysis on
  # the shared macbook-local runner.
  retry:
    max: 1
    when: runner_system_failure
  rules:
    - if: '$SONAR_TOKEN == null || $SONAR_TOKEN == ""'
      when: never
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── TypeDoc API documentation ─────────────────────────────────────────────────
#
# Generates TypeScript API docs from JSDoc comments in Angular services, components,
# and interfaces. Output is published as a pipeline artifact (browsable in GitLab).
#
# The backend's generate-reports job can also invoke `npm run typedoc` as part
# of a combined site that includes Maven site + Compodoc + TypeDoc.
#
# config/typedoc.json controls entry points, output dir, and theme.
# Shield removed 2026-04-20 — `npm run typedoc 2>&1 | tee` pipes through
# tee which exits 0 regardless of typedoc's exit code, so the job was
# already de-facto non-blocking (5+ consecutive green runs on main).
# If typedoc itself breaks (config drift, TypeScript upgrade, missing
# entry point), that's a real doc-build regression and should fail
# loudly; relying on the shell pipe's 0-exit hid that signal.
typedoc:
  stage: quality
  extends: .install
  needs: ["build:production"]
  script:
    # Run TypeDoc — warns are informational; docs still generate cleanly
    - npm run typedoc 2>&1 | tee typedoc-output.txt
    - echo "TypeDoc docs generated at docs/typedoc/"
  artifacts:
    name: "typedoc-${CI_COMMIT_SHORT_SHA}"
    paths:
      - docs/typedoc/
    expire_in: 30 days
    when: always
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == "main"

# ── Stage: docker ─────────────────────────────────────────────────────────────
#
# Build the Angular Docker image (Nginx + compiled SPA) and push it to the
# GitLab Container Registry. Runs only on main and version tags — not on MRs
# to avoid flooding the registry with images that are never deployed.
#
# One tag pushed: $CI_COMMIT_SHA (immutable, traceable).
# Per ADR-0025 the UI is never deployed to Kubernetes, so there is no
# Argo CD puller that would consume a moving :main tag. The downstream
# scan jobs (trivy, syft, dockle, cosign) all reference :$CI_COMMIT_SHA.
