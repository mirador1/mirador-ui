# =============================================================================
# Nginx config for the Angular SPA
#
# Key behaviours:
#   - try_files $uri /index.html: handles Angular client-side routing (HTML5
#     pushState). All unknown paths return index.html so Angular's router
#     takes over, instead of Nginx returning 404.
#   - Long-lived cache for hashed static assets (JS/CSS/fonts) — Angular CLI
#     appends a content hash to filenames, so immutable caching is safe.
#   - Short cache for index.html so a new deploy is picked up quickly.
#   - Gzip compression for all text assets.
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Gzip compression ───────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               application/x-javascript text/xml application/xml
               application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Angular SPA routing ────────────────────────────────────────────────────
    # All routes fall back to index.html so Angular's router handles navigation.
    location / {
        try_files $uri $uri/ /index.html;

        # index.html: short cache — picked up within 1 min after a new deploy
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
            expires 1m;
        }
    }

    # ── Hashed static assets — immutable cache ─────────────────────────────────
    # Angular CLI appends a content hash to every JS/CSS bundle filename.
    # These files never change content once created, so a 1-year cache is safe.
    location ~* \.(js|css|woff2?|ttf|eot|otf)$ {
        add_header Cache-Control "public, immutable, max-age=31536000";
        expires 1y;
        access_log off;
    }

    # ── Images and icons ──────────────────────────────────────────────────────
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
        access_log off;
    }

    # ── Health check endpoint (used by K8s liveness/readiness probes) ─────────
    location = /healthz {
        return 200 "OK\n";
        add_header Content-Type text/plain;
        access_log off;
    }
}
