<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>

  <!-- Outer pulse ring -->
  <circle cx="16" cy="15" r="12" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.3"/>

  <!-- Heartbeat line -->
  <polyline
    points="3,17 9,17 11,11 13,21 15,8 17,24 19,13 21,17 29,17"
    fill="none"
    stroke="#4ade80"
    stroke-width="2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Center dot (health indicator) -->
  <circle cx="15" cy="15" r="2.5" fill="#4ade80" opacity="0.9"/>
  <circle cx="15" cy="15" r="2.5" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.4">
    <animate attributeName="r" values="2.5;5;2.5" dur="2s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>

  <!-- "CO" text (Customer Observability) -->
  <text x="16" y="29" text-anchor="middle" font-family="system-ui,sans-serif" font-size="5" font-weight="800" fill="#94a3b8" letter-spacing="0.5">C/O</text>
</svg>
