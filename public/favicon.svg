<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="sky32" cx="50%" cy="60%" r="60%">
      <stop offset="0%" stop-color="#1e3a5f" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Dark background -->
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- Sky glow -->
  <circle cx="16" cy="16" r="14" fill="url(#sky32)" opacity="0.8"/>
  <!-- Tower body -->
  <rect x="13" y="17" width="6" height="11" rx="0.5" fill="#3b82f6" opacity="0.85"/>
  <!-- Tower platform -->
  <rect x="11" y="15" width="10" height="2" rx="0.5" fill="#3b82f6"/>
  <!-- Battlements (3 merlons) -->
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#3b82f6"/>
  <rect x="14.5" y="13" width="2" height="2" rx="0.3" fill="#3b82f6"/>
  <rect x="18" y="13" width="2" height="2" rx="0.3" fill="#3b82f6"/>
  <!-- Window -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1.2" fill="#0f172a" stroke="#3b82f6" stroke-width="0.4"/>
  <circle cx="16" cy="20" r="0.5" fill="#60a5fa" opacity="0.9"/>
  <!-- Binoculars -->
  <circle cx="14" cy="16" r="0.8" fill="none" stroke="#93c5fd" stroke-width="0.5"/>
  <circle cx="18" cy="16" r="0.8" fill="none" stroke="#93c5fd" stroke-width="0.5"/>
  <!-- Radar arcs -->
  <path d="M 22 12 A 3.5 3.5 0 0 1 25.5 15.5" stroke="#34d399" stroke-width="0.6" fill="none" opacity="0.8"/>
  <path d="M 22 10 A 5.5 5.5 0 0 1 27.5 15.5" stroke="#34d399" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Signal dot -->
  <circle cx="23.5" cy="12.5" r="0.7" fill="#34d399" opacity="0.9"/>
  <!-- Stars -->
  <circle cx="6" cy="7" r="0.4" fill="#60a5fa" opacity="0.7"/>
  <circle cx="10" cy="5" r="0.5" fill="#60a5fa" opacity="0.5"/>
  <circle cx="4" cy="12" r="0.4" fill="#34d399" opacity="0.6"/>
</svg>
