<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="Mirador UI — watchtower over a running system">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0a1424"/>
      <stop offset="50%" stop-color="#0f2238"/>
      <stop offset="100%" stop-color="#081526"/>
    </linearGradient>
    <radialGradient id="beam" cx="18%" cy="55%" r="55%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.22"/>
      <stop offset="60%"  stop-color="#60a5fa" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="title-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"  stop-color="#e2e8f0"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f97087"/>
    </linearGradient>
    <radialGradient id="pulse" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#dd0031" stop-opacity="1"/>
      <stop offset="60%" stop-color="#dd0031" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#dd0031" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#sky)"/>
  <ellipse cx="210" cy="155" rx="900" ry="70" fill="url(#beam)" opacity="0.7"/>

  <g fill="#93c5fd" opacity="0.5">
    <circle cx="860"  cy="48" r="1.1"/>
    <circle cx="940"  cy="68" r="0.9"/>
    <circle cx="1020" cy="34" r="1.3"/>
    <circle cx="1100" cy="80" r="0.8"/>
    <circle cx="980"  cy="110" r="0.7"/>
    <circle cx="1130" cy="150" r="1.0"/>
  </g>
  <g fill="#dd0031" opacity="0.4">
    <circle cx="900"  cy="92" r="0.9"/>
    <circle cx="1070" cy="52" r="1.0"/>
  </g>

  <line x1="0" y1="228" x2="1200" y2="228" stroke="#1e293b" stroke-width="1" opacity="0.9"/>

  <!-- Watchtower silhouette — UI variant keeps the same shape but swaps
       the beacon to the Angular red so the UI banner reads as
       "the front-row seat". -->
  <g transform="translate(140 72)" opacity="0.95">
    <rect x="22" y="76" width="30" height="80" rx="2" fill="#34d399" opacity="0.92"/>
    <rect x="10" y="62" width="54" height="16" rx="2" fill="#34d399"/>
    <rect x="10" y="54" width="9" height="8" rx="1" fill="#34d399"/>
    <rect x="23" y="54" width="9" height="8" rx="1" fill="#34d399"/>
    <rect x="36" y="54" width="9" height="8" rx="1" fill="#34d399"/>
    <rect x="49" y="54" width="9" height="8" rx="1" fill="#34d399"/>
    <ellipse cx="37" cy="92" rx="5.5" ry="4.5" fill="#0a1424" stroke="#93c5fd" stroke-width="1.4"/>
    <circle cx="37" cy="92" r="2.2" fill="#60a5fa"/>
    <circle cx="37" cy="50" r="5" fill="url(#pulse)"/>
    <circle cx="37" cy="50" r="1.8" fill="#dd0031"/>
    <g fill="none" stroke="#dd0031" stroke-linecap="round" opacity="0.7">
      <path d="M 80 60 A 32 32 0 0 1 112 92"   stroke-width="1.3"/>
      <path d="M 80 46 A 48 48 0 0 1 128 92"   stroke-width="1.1" opacity="0.55"/>
      <path d="M 80 32 A 64 64 0 0 1 144 92"   stroke-width="0.9" opacity="0.35"/>
      <path d="M 80 18 A 80 80 0 0 1 160 92"   stroke-width="0.7" opacity="0.20"/>
    </g>
  </g>

  <g font-family="'Inter','Segoe UI',system-ui,sans-serif">
    <text x="296" y="138" font-size="96" font-weight="800" letter-spacing="6" fill="url(#title-grad)">MIRADOR</text>
    <text x="298" y="174" font-size="15" font-weight="500" fill="#94a3b8" letter-spacing="4.5">
      WATCHTOWER OVER A RUNNING SYSTEM
    </text>
    <rect x="298" y="186" width="80" height="2" rx="1" fill="#dd0031" opacity="0.8"/>
    <rect x="382" y="186" width="4"  height="2" rx="1" fill="#dd0031" opacity="0.4"/>
    <rect x="390" y="186" width="2"  height="2" rx="1" fill="#dd0031" opacity="0.2"/>
  </g>

  <g font-family="'JetBrains Mono','Fira Code',ui-monospace,monospace"
     fill="#64748b" font-size="10.5" letter-spacing="1" text-anchor="end">
    <text x="1170" y="248">mirador-ui  ·  Angular 21  ·  zoneless · signals</text>
    <text x="1170" y="264" fill="#475569" font-size="9.5">gitlab.com/mirador1  ·  paired backend: mirador-service</text>
  </g>
</svg>
