<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280" role="img" aria-label="Mirador — watchtower over a running system">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#0b1628"/>
      <stop offset="55%" stop-color="#0f2238"/>
      <stop offset="100%" stop-color="#0a1a2d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="55%" r="60%">
      <stop offset="0%"   stop-color="#60a5fa" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="280" fill="url(#sky)"/>
  <circle cx="600" cy="150" r="260" fill="url(#glow)"/>

  <!-- Subtle stars -->
  <g fill="#60a5fa" opacity="0.45">
    <circle cx="90"   cy="40"  r="1.4"/>
    <circle cx="180"  cy="70"  r="1.0"/>
    <circle cx="1050" cy="50"  r="1.6"/>
    <circle cx="1150" cy="100" r="1.1"/>
    <circle cx="50"   cy="220" r="1.2"/>
    <circle cx="1150" cy="240" r="1.3"/>
  </g>

  <!-- Watchtower silhouette (left) -->
  <g transform="translate(92 48)" fill="#34d399" opacity="0.95">
    <rect x="18" y="80" width="28" height="100" rx="2" opacity="0.9"/>
    <rect x="8"  y="66" width="48" height="14" rx="2"/>
    <rect x="8"  y="58" width="8"  height="8"  rx="1"/>
    <rect x="20" y="58" width="8"  height="8"  rx="1"/>
    <rect x="32" y="58" width="8"  height="8"  rx="1"/>
    <rect x="44" y="58" width="8"  height="8"  rx="1"/>
    <g fill="none" stroke="#34d399" stroke-width="1.2" opacity="0.8">
      <path d="M 78 56 A 22 22 0 0 1 100 78"/>
      <path d="M 78 46 A 32 32 0 0 1 110 78"/>
      <path d="M 78 36 A 42 42 0 0 1 120 78"/>
    </g>
    <circle cx="34" cy="92" r="4" fill="#0b1628" stroke="#93c5fd" stroke-width="1.3"/>
    <circle cx="34" cy="92" r="1.8" fill="#60a5fa"/>
  </g>

  <!-- Main title -->
  <g font-family="'Inter','Segoe UI',system-ui,sans-serif">
    <text x="240" y="130" font-size="72" font-weight="800" fill="#e2e8f0" letter-spacing="4">
      MIRADOR
    </text>
    <text x="240" y="162" font-size="17" font-weight="500" fill="#94a3b8" letter-spacing="3">
      <tspan fill="#34d399">·</tspan>  WATCHTOWER OVER A RUNNING SYSTEM  <tspan fill="#34d399">·</tspan>
    </text>
    <text x="240" y="188" font-size="13" font-weight="400" fill="#64748b" letter-spacing="1">
      code · runtime metrics · CI/CD · industrial tooling — observed from one pane
    </text>
  </g>
  <rect x="240" y="200" width="120" height="2" rx="1" fill="#34d399" opacity="0.6"/>

  <!-- Word cloud -->
  <g font-family="'Inter',system-ui,sans-serif" font-weight="700">
    <!-- Platform axis (top) -->
    <text x="240"  y="60"  font-size="13" fill="#94a3b8">Kubernetes</text>
    <text x="342"  y="60"  font-size="13" fill="#94a3b8">Kustomize</text>
    <text x="440"  y="60"  font-size="13" fill="#94a3b8">Argo CD</text>
    <text x="520"  y="60"  font-size="13" fill="#94a3b8">Terraform</text>
    <text x="622"  y="60"  font-size="13" fill="#94a3b8">GitOps</text>
    <text x="696"  y="60"  font-size="13" fill="#94a3b8">GKE Autopilot</text>
    <text x="820"  y="60"  font-size="13" fill="#94a3b8">cert-manager</text>
    <text x="940"  y="60"  font-size="13" fill="#94a3b8">External Secrets</text>

    <!-- AI highlight -->
    <text x="900"  y="50"  font-size="18" fill="#34d399">🤖 AI-assisted integration</text>
    <text x="900"  y="70"  font-size="11" fill="#64748b">LLM-authored ADRs · glossary · CI · K8s baseline</text>

    <!-- Languages / frameworks row -->
    <text x="260"  y="95"  font-size="15" fill="#dd0031">Angular 21</text>
    <text x="370"  y="95"  font-size="15" fill="#3178c6">TypeScript</text>
    <text x="478"  y="95"  font-size="15" fill="#6DB33F">Spring Boot 4</text>
    <text x="620"  y="95"  font-size="15" fill="#ed8b00">Java 25</text>
    <text x="708"  y="95"  font-size="13" fill="#94a3b8">Virtual Threads</text>
    <text x="840"  y="95"  font-size="13" fill="#94a3b8">Signals · Zoneless</text>
    <text x="1000" y="95"  font-size="13" fill="#94a3b8">Micrometer</text>

    <!-- Core observability (centre bright) -->
    <text x="240"  y="232" font-size="22" fill="#60a5fa">OpenTelemetry</text>
    <text x="410"  y="232" font-size="22" fill="#fbbf24">Grafana</text>
    <text x="528"  y="232" font-size="20" fill="#34d399">Prometheus</text>
    <text x="678"  y="232" font-size="18" fill="#f87171">Tempo</text>
    <text x="755"  y="232" font-size="18" fill="#a78bfa">Loki</text>
    <text x="815"  y="232" font-size="14" fill="#22d3ee">Pyroscope</text>

    <!-- Data / messaging column (right) -->
    <text x="1010" y="120" font-size="14" fill="#4169e1">PostgreSQL</text>
    <text x="1010" y="142" font-size="14" fill="#dc382d">Redis</text>
    <text x="1010" y="164" font-size="14" fill="#e0e0e0">Kafka</text>
    <text x="1010" y="186" font-size="12" fill="#94a3b8">Flyway · Testcontainers</text>

    <!-- Supply chain / CI (bottom row) -->
    <text x="240"  y="260" font-size="12" fill="#94a3b8">GitLab CI</text>
    <text x="322"  y="260" font-size="12" fill="#94a3b8">cosign</text>
    <text x="383"  y="260" font-size="12" fill="#94a3b8">Sigstore</text>
    <text x="458"  y="260" font-size="12" fill="#94a3b8">Syft · Grype · Trivy</text>
    <text x="605"  y="260" font-size="12" fill="#94a3b8">Dockle</text>
    <text x="664"  y="260" font-size="12" fill="#94a3b8">Semgrep</text>
    <text x="738"  y="260" font-size="12" fill="#94a3b8">OWASP Dep-Check</text>
    <text x="880"  y="260" font-size="12" fill="#94a3b8">Sonar</text>
    <text x="930"  y="260" font-size="12" fill="#94a3b8">PIT</text>
    <text x="962"  y="260" font-size="12" fill="#94a3b8">JaCoCo</text>
    <text x="1030" y="260" font-size="12" fill="#94a3b8">Renovate</text>
    <text x="1110" y="260" font-size="12" fill="#94a3b8">WIF</text>
  </g>

  <!-- Repo badge (top right corner) -->
  <g transform="translate(1040 172)">
    <rect x="0" y="0" width="140" height="38" rx="8" fill="#1e293b" stroke="#334155"/>
    <text x="12" y="17" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="700" fill="#94a3b8" letter-spacing="2">REPOSITORY</text>
    <text x="12" y="31" font-family="'JetBrains Mono','Fira Code',monospace" font-size="13" font-weight="700" fill="#e2e8f0">mirador-ui</text>
  </g>
</svg>
