<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 280" width="1200" height="280">
  <defs>
    <!-- Background gradient: deep navy to dark blue-green -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="50%" stop-color="#0d1f38"/>
      <stop offset="100%" stop-color="#071a2e"/>
    </linearGradient>
    <!-- Glow for heartbeat line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Subtle glow for title -->
    <filter id="textGlow" x="-5%" y="-20%" width="110%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Grid pattern for background texture -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a5f" stroke-width="0.3" opacity="0.4"/>
    </pattern>
    <!-- Pulse animation mask -->
    <clipPath id="clip">
      <rect width="1200" height="280" rx="16"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="280" rx="16" fill="url(#bg)"/>
  <rect width="1200" height="280" rx="16" fill="url(#grid)"/>

  <!-- Decorative left panel (dark) -->
  <rect x="0" y="0" width="340" height="280" rx="16" fill="#0a1628" opacity="0.6" clip-path="url(#clip)"/>
  <rect x="320" y="0" width="1" height="280" fill="#1e3a5f" opacity="0.5"/>

  <!-- Left panel: big logo icon -->
  <!-- Outer ring -->
  <circle cx="170" cy="140" r="95" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.25"/>
  <circle cx="170" cy="140" r="80" fill="none" stroke="#3b82f6" stroke-width="0.8" opacity="0.15"/>

  <!-- Heartbeat ECG line (left panel, centered) -->
  <!-- Scale: viewBox 0 0 32 32 → scaled to fit width~170px, centered at 170,140 -->
  <!-- Original: 3→29 = 26 units wide. Target ~170px wide → scale ~6.5. Center offset: 170 - (16*6.5)=66 -->
  <polyline
    points="66,140 105,140 118,112 131,168 144,90 157,186 170,119 183,140 222,140"
    fill="none"
    stroke="#4ade80"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Center pulse dot -->
  <circle cx="170" cy="140" r="7" fill="#4ade80" opacity="0.9" filter="url(#glow)"/>
  <circle cx="170" cy="140" r="14" fill="none" stroke="#4ade80" stroke-width="1" opacity="0.3"/>

  <!-- Right content area -->

  <!-- Project title -->
  <text x="370" y="90" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800"
        fill="#f8fafc" filter="url(#textGlow)" letter-spacing="-1">
    Mirador UI
  </text>

  <!-- Subtitle -->
  <text x="372" y="128" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="400"
        fill="#94a3b8" letter-spacing="0.3">
    Full-stack observability dashboard — Angular 21 · Spring Boot 4 · Zoneless
  </text>

  <!-- Divider -->
  <line x1="372" y1="148" x2="820" y2="148" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Tech badges row -->
  <!-- Angular badge -->
  <rect x="372" y="162" width="112" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="427" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#f87171" text-anchor="middle">⬡  Angular 21</text>

  <!-- Spring Boot badge -->
  <rect x="494" y="162" width="128" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="557" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#4ade80" text-anchor="middle">🍃  Spring Boot 4</text>

  <!-- Java badge -->
  <rect x="632" y="162" width="88" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="675" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#fb923c" text-anchor="middle">☕  Java 25</text>

  <!-- Docker badge -->
  <rect x="730" y="162" width="96" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="777" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#38bdf8" text-anchor="middle">🐳  Docker</text>

  <!-- K8s badge -->
  <rect x="836" y="162" width="104" height="30" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="887" y="182" font-family="system-ui,sans-serif" font-size="12" font-weight="600"
        fill="#818cf8" text-anchor="middle">☸️  Kubernetes</text>

  <!-- Features row -->
  <text x="372" y="224" font-family="system-ui,sans-serif" font-size="13" fill="#64748b">
    📊 Metrics · 🔍 Traces · 📋 Logs · 🔥 Profiling · 🧨 Chaos · 🤖 AI · 🔐 Auth · 🐘 DB
  </text>

  <!-- GitLab badge (top-right) -->
  <rect x="1040" y="20" width="140" height="28" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="1110" y="38" font-family="system-ui,sans-serif" font-size="11" font-weight="500"
        fill="#a78bfa" text-anchor="middle">🦊  gitlab.com/mirador1</text>

  <!-- Decorative right-side waveform suggestion -->
  <g opacity="0.08">
    <polyline points="960,60 980,60 990,30 1000,90 1010,15 1020,105 1030,45 1040,60 1080,60"
      fill="none" stroke="#4ade80" stroke-width="2" stroke-linecap="round"/>
    <polyline points="960,80 980,80 990,50 1000,110 1010,35 1020,125 1030,65 1040,80 1080,80"
      fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Bottom accent line -->
  <rect x="16" y="270" width="1168" height="3" rx="1.5" fill="url(#bg)" opacity="0.3"/>
  <rect x="370" y="269" width="180" height="3" rx="1.5" fill="#4ade80" opacity="0.6"/>
</svg>
