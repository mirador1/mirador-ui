<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- mirador-ui (Angular 21) — RED variant per Angular brand (#DD0031).
       Watchtower silhouette mirrors the mirador-service logo for visual
       sibling identity ; only the colour scheme differs to flag repo
       at-a-glance in the GitLab group sidebar. -->
  <rect width="32" height="32" rx="7" fill="#DD0031"/>
  <rect x="2" y="2" width="28" height="28" rx="5.5" fill="#ffffff"/>
  <!-- Tower body -->
  <rect x="13" y="17" width="6" height="11" rx="0.5" fill="#DD0031" opacity="0.9"/>
  <!-- Tower platform -->
  <rect x="11" y="15" width="10" height="2" rx="0.5" fill="#DD0031"/>
  <!-- Battlements (3 merlons) -->
  <rect x="11" y="13" width="2" height="2" rx="0.3" fill="#DD0031"/>
  <rect x="14.5" y="13" width="2" height="2" rx="0.3" fill="#DD0031"/>
  <rect x="18" y="13" width="2" height="2" rx="0.3" fill="#DD0031"/>
  <!-- Window -->
  <ellipse cx="16" cy="20" rx="1.5" ry="1.2" fill="#ffffff" stroke="#DD0031" stroke-width="0.5"/>
  <circle cx="16" cy="20" r="0.5" fill="#C3002F" opacity="0.9"/>
  <!-- Binoculars -->
  <circle cx="14" cy="16" r="0.8" fill="none" stroke="#A6002A" stroke-width="0.5"/>
  <circle cx="18" cy="16" r="0.8" fill="none" stroke="#A6002A" stroke-width="0.5"/>
  <!-- Radar arcs (Angular accent purple #C3002F lighter) -->
  <path d="M 22 12 A 3.5 3.5 0 0 1 25.5 15.5" stroke="#FF4081" stroke-width="0.7" fill="none" opacity="0.9"/>
  <path d="M 22 10 A 5.5 5.5 0 0 1 27.5 15.5" stroke="#FF4081" stroke-width="0.55" fill="none" opacity="0.6"/>
  <!-- Signal dot -->
  <circle cx="23.5" cy="12.5" r="0.7" fill="#FF4081" opacity="0.95"/>
</svg>
